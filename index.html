<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AL HAYAT TRADING COMPANY</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#f5f5f5;
overflow-x:hidden;
color:#111;
}

/* HEADER */

header{
background:#000;
padding:18px 35px;
display:flex;
align-items:center;
justify-content:space-between;
gap:20px;
position:sticky;
top:0;
z-index:9999;
}

.logo{
display:flex;
align-items:center;
gap:14px;
}

.logo img{
width:58px;
height:58px;
border-radius:10px;
object-fit:cover;
background:white;
}

.logo h1{
font-size:28px;
font-weight:900;
color:white;
letter-spacing:1px;
}

.search-box{
flex:1;
max-width:850px;
display:flex;
background:white;
border-radius:10px;
overflow:hidden;
}

.search-box input{
flex:1;
padding:18px;
border:none;
outline:none;
font-size:16px;
font-weight:600;
}

.search-box button{
width:80px;
border:none;
background:#ff9900;
font-size:22px;
cursor:pointer;
font-weight:bold;
}

.contact{
color:white;
font-weight:700;
font-size:15px;
white-space:nowrap;
}

/* HERO */

.hero{
height:420px;
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438?q=80&w=1600&auto=format&fit=crop');

background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

.hero-content h2{
font-size:65px;
font-weight:900;
color:white;
margin-bottom:18px;
}

.hero-content p{
font-size:24px;
font-weight:600;
color:white;
}

/* CATEGORY SECTION */

.category-section{
padding:40px 30px;
}

.category-header{
margin-bottom:25px;
border-bottom:4px solid #111;
padding-bottom:12px;
}

.category-title{
font-size:42px;
font-weight:900;
text-transform:uppercase;
}

/* PRODUCTS */

.products-row{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:24px;
}

.card{
background:white;
border-radius:18px;
overflow:hidden;
transition:.25s;
cursor:pointer;
box-shadow:0 3px 12px rgba(0,0,0,.08);
display:flex;
flex-direction:column;
}

.card:hover{
transform:translateY(-5px);
}

.product-image{
height:320px;
background:white;
display:flex;
align-items:center;
justify-content:center;
padding:25px;
}

.product-image img{
width:100%;
height:100%;
object-fit:contain;
}

.product-content{
padding:22px;
display:flex;
flex-direction:column;
height:100%;
}

.product-title{
font-size:20px;
font-weight:800;
line-height:1.45;
margin-bottom:12px;
min-height:85px;
}

.product-meta{
font-size:14px;
font-weight:700;
color:#555;
margin-bottom:6px;
}

.product-price{
font-size:34px;
font-weight:900;
margin-top:10px;
margin-bottom:10px;
}

.stock{
font-size:15px;
font-weight:800;
margin-bottom:15px;
}

.instock{
color:green;
}

.outstock{
color:red;
}

.card-btn{
margin-top:auto;
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:17px;
font-weight:800;
background:#25D366;
color:white;
cursor:pointer;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.75);
display:none;
align-items:center;
justify-content:center;
padding:25px;
z-index:999999;
}

.modal-box{
background:white;
width:100%;
max-width:1250px;
border-radius:22px;
overflow:hidden;
display:grid;
grid-template-columns:1fr 1fr;
position:relative;
max-height:95vh;
overflow-y:auto;
}

.close-modal{
position:absolute;
top:18px;
right:24px;
font-size:42px;
font-weight:900;
cursor:pointer;
z-index:999;
}

.modal-left{
padding:30px;
}

.main-image{
width:100%;
height:500px;
object-fit:contain;
margin-bottom:20px;
}

.thumbs{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.thumb{
width:95px;
height:95px;
border:2px solid #ddd;
border-radius:12px;
padding:5px;
object-fit:contain;
cursor:pointer;
}

.modal-right{
padding:35px;
}

.modal-title{
font-size:38px;
font-weight:900;
line-height:1.4;
margin-bottom:15px;
}

.modal-price{
font-size:46px;
font-weight:900;
margin-bottom:16px;
}

.modal-detail{
font-size:16px;
font-weight:700;
margin-bottom:12px;
}

.features{
margin-top:10px;
padding-left:18px;
margin-bottom:25px;
}

.features li{
margin-bottom:10px;
font-size:15px;
line-height:1.5;
font-weight:600;
}

.order-btn{
width:100%;
padding:18px;
border:none;
border-radius:12px;
background:#25D366;
font-size:20px;
font-weight:900;
color:white;
cursor:pointer;
}

/* FLOAT */

.float{
position:fixed;
right:18px;
bottom:18px;
width:72px;
height:72px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
color:white;
text-decoration:none;
z-index:999;
}

/* FOOTER */

footer{
background:#000;
color:white;
text-align:center;
padding:35px;
margin-top:40px;
font-weight:700;
}

/* MOBILE */

@media(max-width:900px){

header{
padding:14px;
flex-wrap:wrap;
}

.logo h1{
font-size:18px;
}

.contact{
display:none;
}

.hero{
height:300px;
}

.hero-content h2{
font-size:34px;
}

.hero-content p{
font-size:16px;
}

.category-title{
font-size:28px;
}

.products-row{
grid-template-columns:1fr 1fr;
gap:14px;
}

.product-image{
height:220px;
padding:15px;
}

.product-title{
font-size:15px;
min-height:auto;
}

.product-price{
font-size:24px;
}

.modal-box{
grid-template-columns:1fr;
}

.main-image{
height:320px;
}

.modal-title{
font-size:28px;
}

.modal-price{
font-size:34px;
}

}

@media(max-width:600px){

.products-row{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<header>

<div class="logo">

<img src="https://i.postimg.cc/ncHVXSW3/LOGO.jpg">

<h1>AL HAYAT TRADING</h1>

</div>

<div class="search-box">

<input
type="text"
placeholder="Search supplements..."
id="searchInput"
onkeyup="searchProducts()">

<button>
🔍
</button>

</div>

<div class="contact">
📞 +91 77100 77786
</div>

</header>

<section class="hero">

<div class="hero-content">

<h2>100% Authentic Imported Supplements</h2>

<p>
Whey Protein • Creatine • Pre Workout • Mass Gainer • Protein Snacks
</p>

</div>

</section>

<div id="allCategories"></div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-box">

<div class="close-modal" onclick="closeModal()">
×
</div>

<div class="modal-left">

<img id="mainImage" class="main-image">

<div class="thumbs" id="thumbs"></div>

</div>

<div class="modal-right">

<div id="modalTitle" class="modal-title"></div>

<div id="modalPrice" class="modal-price"></div>

<div id="modalStock" class="stock"></div>

<div id="modalSize" class="modal-detail"></div>

<div id="modalFlavor" class="modal-detail"></div>

<ul id="modalFeatures" class="features"></ul>

<button id="orderBtn" class="order-btn">
Order On WhatsApp
</button>

</div>

</div>

</div>

<footer>

© 2026 AL HAYAT TRADING COMPANY — ALL RIGHTS RESERVED

</footer>

<a
href="https://wa.me/917710077786"
class="float"
target="_blank">

💬

</a>

<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQZimj_keJIooGDnz0sOvML4cjwbQ8eZBnQ3CQ1xyiORgHssrZPaCYzqdbFz-EmKmFrAqBgV6C3kLUK/pub?output=csv";

const WHATSAPP =
"917710077786";

let allProducts = [];

function clean(text){

if(!text) return "";

return text
.replace(/"/g,"")
.replace(/\r/g,"")
.trim();

}

function getFeatures(product){

const title =
(product.item || "").toLowerCase();

if(title.includes("whey")){

return [
"Supports Lean Muscle Recovery",
"Premium Imported Whey Protein",
"Fast Mixing & Great Taste",
"Trusted International Brand"
];

}

if(title.includes("creatine")){

return [
"Increases Strength & Performance",
"Supports Muscle Power",
"Micronized Formula",
"Ideal For Daily Training"
];

}

if(title.includes("pre")){

return [
"Supports Energy & Focus",
"Improves Workout Performance",
"Advanced Pre Workout Formula",
"Popular Imported Supplement"
];

}

return [
"100% Authentic Imported Supplement",
"Premium International Formula",
"Trusted Sports Nutrition Brand",
"Supports Fitness Goals"
];

}

async function loadProducts(){

try{

const response =
await fetch(CSV_URL);

const csv =
await response.text();

const rows =
csv.split("\n").slice(1);

allProducts = [];

rows.forEach(row=>{

const cols =
row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

if(!cols || cols.length < 11) return;

const product = {

sku: clean(cols[0]),
brand: clean(cols[1]),
item: clean(cols[2]),
price: clean(cols[3]),
stock: clean(cols[4]),
category: clean(cols[5]),
size: clean(cols[6]),
flavour: clean(cols[7]),
image1: clean(cols[8]),
image2: clean(cols[9]),
image3: clean(cols[10])

};

if(product.item){

product.features =
getFeatures(product);

allProducts.push(product);

}

});

renderCategories(allProducts);

}catch(error){

document.getElementById("allCategories").innerHTML =
"<h2 style='padding:40px;color:red;'>Unable To Load Products</h2>";

console.log(error);

}

}

function renderCategories(products){

const container =
document.getElementById("allCategories");

container.innerHTML = "";

const categories = {};

products.forEach(product=>{

const category =
product.category || "Supplements";

if(!categories[category]){

categories[category] = [];

}

categories[category].push(product);

});

Object.keys(categories).forEach(category=>{

const section =
document.createElement("div");

section.className =
"category-section";

section.innerHTML = `

<div class="category-header">

<div class="category-title">
${category}
</div>

</div>

<div class="products-row">

${categories[category].map(product => `

<div class="card" onclick="openModal('${product.sku}')">

<div class="product-image">

<img
src="${product.image1}"
loading="lazy"
onerror="this.src='https://via.placeholder.com/400x400?text=No+Image'">

</div>

<div class="product-content">

<div class="product-title">
${product.item}
</div>

<div class="product-meta">
${product.brand}
</div>

<div class="product-meta">
Flavor: ${product.flavour}
</div>

<div class="product-meta">
Size: ${product.size}
</div>

<div class="product-price">
₹${product.price}
</div>

<div class="stock ${product.stock.toLowerCase().includes('out') ? 'outstock' : 'instock'}">
${product.stock}
</div>

<button class="card-btn">

${product.stock.toLowerCase().includes('out')
?
'Out Of Stock'
:
'View Product'}

</button>

</div>

</div>

`).join("")}

</div>

`;

container.appendChild(section);

});

}

function searchProducts(){

const text =
document.getElementById("searchInput")
.value
.toLowerCase();

if(text === ""){

renderCategories(allProducts);
return;

}

const filtered =
allProducts.filter(product =>

(product.item || "").toLowerCase().includes(text)

||

(product.brand || "").toLowerCase().includes(text)

||

(product.category || "").toLowerCase().includes(text)

||

(product.flavour || "").toLowerCase().includes(text)

);

renderCategories(filtered);

}

function openModal(sku){

const product =
allProducts.find(p => p.sku === sku);

if(!product) return;

document.getElementById("modal").style.display =
"flex";

document.getElementById("mainImage").src =
product.image1;

document.getElementById("modalTitle").innerText =
product.item;

document.getElementById("modalPrice").innerText =
`₹${product.price}`;

document.getElementById("modalStock").innerText =
product.stock;

document.getElementById("modalStock").className =
`stock ${product.stock.toLowerCase().includes('out') ? 'outstock' : 'instock'}`;

document.getElementById("modalSize").innerText =
`Size: ${product.size}`;

document.getElementById("modalFlavor").innerText =
`Flavor: ${product.flavour}`;

document.getElementById("modalFeatures").innerHTML =

product.features.map(feature =>

`<li>${feature}</li>`

).join("");

document.getElementById("thumbs").innerHTML = `

<img
class="thumb"
src="${product.image1}"
onclick="changeImage('${product.image1}')">

<img
class="thumb"
src="${product.image2}"
onclick="changeImage('${product.image2}')">

<img
class="thumb"
src="${product.image3}"
onclick="changeImage('${product.image3}')">

`;

document.getElementById("orderBtn").onclick = function(){

const message =

`Hello,

I want to order:

${product.item}

Flavor: ${product.flavour}

Size: ${product.size}

Price: ₹${product.price}

Please share payment details.`;

window.open(

`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(message)}`,

"_blank"

);

};

}

function changeImage(src){

document.getElementById("mainImage").src =
src;

}

function closeModal(){

document.getElementById("modal").style.display =
"none";

}

window.onclick = function(event){

const modal =
document.getElementById("modal");

if(event.target === modal){

closeModal();

}

};

loadProducts();

</script>

</body>

</html>
