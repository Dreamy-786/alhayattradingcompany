<style>

body{

/* HEADER */

.topbar{
background:#131921;
padding:12px 18px;

}

.menu-btn{

.logo h1{
color:white;
font-size:24px;
font-weight:900;

}

.search-wrapper{

}

.search-wrapper input{
width:100%;
padding:15px;
font-size:16px;

.contact{

}

/* SEARCH DROPDOWN */

.suggestions{
position:absolute;

left:0;
width:100%;

}

}

.suggestion-item:hover{

}

/* SIDEBAR */

.sidebar{
position:fixed;
left:-330px;
top:0;

height:100%;

z-index:99999;
overflow-y:auto;

}

.sidebar-header{

color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;

font-weight:900;
}

.close-sidebar{
cursor:pointer;

}

.sidebar-section{
padding:20px;
border-bottom:1px solid #eee;
}

.sidebar-title{
font-size:24px;
font-weight:900;
margin-bottom:18px;
}

.sidebar-item{
padding:12px 0;
font-size:16px;

transition:0.2s;
}

.sidebar-item:hover{
color:#ff9900;

}

/* HERO */

.hero{
height:430px;
background:
linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),

}

.hero-content p{

}

/* SECTION */

}

}

.card{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 4px 14px rgba(0,0,0,0.1);
transition:0.3s;
display:flex;
flex-direction:column;
}

.card:hover{
transform:translateY(-5px);
}

.image-area{
height:330px;
background:white;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.image-area img{
width:100%;
height:100%;
object-fit:contain;
}

.card-content{
padding:20px;
display:flex;
flex-direction:column;
height:100%;
}

.product-title{
font-size:22px;
font-weight:900;
line-height:1.45;
margin-bottom:12px;
min-height:100px;
}

.meta{
font-size:15px;
font-weight:bold;
margin-bottom:10px;
color:#444;
}

.price{
font-size:36px;
font-weight:900;
margin-bottom:10px;
}

.stock{
font-size:16px;
font-weight:bold;
margin-bottom:14px;
}

.instock{
color:green;
}

.outstock{
color:red;
}

.bullets{
padding-left:20px;
margin-bottom:20px;
}

.bullets li{
margin-bottom:8px;
font-size:15px;
line-height:1.45;
}

.card-btn{
margin-top:auto;
width:100%;
padding:15px;
background:#25D366;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
color:white;
cursor:pointer;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:999999;
}

.modal-content{
background:white;
width:100%;
max-width:1200px;
border-radius:20px;
display:grid;
grid-template-columns:1fr 1fr;
overflow:hidden;
position:relative;
max-height:95vh;
overflow-y:auto;
}

.close-modal{
position:absolute;
top:12px;
right:20px;
font-size:42px;
font-weight:bold;
cursor:pointer;
z-index:999;
}

.left-modal{
padding:24px;
}

.main-image{
width:100%;
height:480px;
object-fit:contain;
margin-bottom:20px;
}

.thumbs{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.thumb{
width:90px;
height:90px;
border:2px solid #ddd;
border-radius:10px;
padding:5px;
object-fit:contain;
cursor:pointer;
}

.right-modal{
padding:30px;
}

.modal-title{
font-size:36px;
font-weight:900;
line-height:1.45;
margin-bottom:18px;
}

.modal-price{
font-size:44px;
font-weight:900;
margin-bottom:14px;
}

.modal-detail{
font-size:16px;
font-weight:bold;
margin-bottom:12px;
}

.flavour-select{
width:100%;
padding:14px;
font-size:16px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:18px;
}

.order-btn{
width:100%;
padding:18px;
background:#25D366;
border:none;
border-radius:10px;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

/* FLOAT */

.float{
position:fixed;
right:20px;
bottom:20px;
width:72px;
height:72px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
text-decoration:none;
color:white;
z-index:999;
}

/* FOOTER */

footer{
background:#131921;
color:white;
text-align:center;
padding:35px;
margin-top:40px;
}

/* MOBILE */

@media(max-width:900px){

.logo h1{
font-size:18px;
}

.contact{
display:none;
}

.hero{
height:300px;
}

.hero-content h2{
font-size:34px;
}

.hero-content p{
font-size:18px;
}

.modal-content{
grid-template-columns:1fr;
}

.main-image{
height:320px;
}

}

</style>

</head>

<script>

/* ===============================
CONFIG
=============================== */

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQZimj_keJIooGDnz0sOvML4cjwbQ8eZBnQ3CQ1xyiORgHssrZPaCYzqdbFz-EmKmFrAqBgV6C3kLUK/pub?output=csv";

const WHATSAPP =
"917710077786";

/* ===============================
DATA
=============================== */

let allProducts = [];
let groupedProducts = [];
let filteredProducts = [];

/* ===============================
BULLETS
=============================== */

function getBullets(product){

const title =
product.item.toLowerCase();

const category =
(product.category || "").toLowerCase();

if(title.includes("isoflex")){

return [
"100% Whey Protein Isolate Formula",
"Supports Lean Muscle Recovery",
"Fast Digesting & Easy Mixing",
"Low Sugar & Low Fat Protein"
];

}

if(title.includes("mesomorph")){

return [
"Extreme Energy & Focus Formula",
"Supports Intense Workout Performance",
"High Stimulant Pre Workout Blend",
"Popular Advanced Pre Workout"
];

}

if(title.includes("creatine")){

return [
"Supports Strength & Muscle Power",
"Improves Workout Performance",
"Micronized Creatine Formula",
"Ideal For Daily Training"
];

}

if(title.includes("bcaa")){

return [
"Supports Muscle Recovery",
"Essential Amino Acid Formula",
"Helps Reduce Muscle Breakdown",
"Perfect Intra Workout Supplement"
];

}

if(category.includes("protein")){

return [
"Premium Imported Protein Formula",
"Supports Lean Muscle Growth",
"High Quality Sports Nutrition",
"Trusted International Supplement"
];

}

return [
"Premium Imported Supplement",
"Supports Fitness Goals",
"High Quality Formula",
"Trusted International Brand"
];

}

/* ===============================
LOAD PRODUCTS
=============================== */

async function loadProducts(){

try{

const response =
await fetch(CSV_URL);

const csv =
await response.text();

const rows =
csv.trim().split("\n").slice(1);

allProducts = [];

rows.forEach(row=>{

const cols =
row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

if(!cols || cols.length < 13) return;

const product = {

sku: clean(cols[0]),

item: clean(cols[1]),

price: clean(cols[2]),

stock: clean(cols[3]),

flavour: clean(cols[4]),

size: clean(cols[5]),

brand: clean(cols[6]),

mainCategory: clean(cols[7]),

category: clean(cols[8]),

image1: clean(cols[9]),

image2: clean(cols[10]),

image3: clean(cols[11])

};

product.bullets =
getBullets(product);

allProducts.push(product);

});

filteredProducts = [...allProducts];

renderSidebar();
renderProducts();

}catch(err){

document.getElementById("products").innerHTML =
"<h2 style='padding:30px;color:red;'>Unable To Load Products</h2>";

console.log(err);

}

}

function clean(text){

return text
.replace(/"/g,"")
.trim();

}

/* ===============================
SIDEBAR
=============================== */

function renderSidebar(){

const brands =
[...new Set(allProducts.map(p=>p.brand).filter(Boolean))];

document.getElementById("brandContainer")
.innerHTML =

brands.map(brand=>

`<div
class="sidebar-item"
onclick="filterBrand('${brand}')">

${brand}

</div>`

).join("");

const categories =
[...new Set(allProducts.map(p=>p.mainCategory).filter(Boolean))];

document.getElementById("categoryContainer")
.innerHTML =

categories.map(category=>

`<div
class="sidebar-item"
onclick="filterCategory('${category}')">

${category}

</div>`

).join("");

}

function filterBrand(brand){

filteredProducts =
allProducts.filter(p=>p.brand===brand);

renderProducts();

closeSidebar();

}

function filterCategory(category){

filteredProducts =
allProducts.filter(p=>p.mainCategory===category);

renderProducts();

closeSidebar();

}

function showAllProducts(){

filteredProducts =
[...allProducts];

renderProducts();

closeSidebar();

}

/* ===============================
RENDER PRODUCTS
=============================== */

function renderProducts(){

const container =
document.getElementById("products");

container.innerHTML = "";

const grouped = {};

filteredProducts.forEach(product=>{

const key =
product.item;

if(!grouped[key]){

grouped[key] = [];

}

grouped[key].push(product);

});

groupedProducts =
Object.values(grouped);

groupedProducts.forEach((group,index)=>{

const product =
group[0];

container.innerHTML += `

<div class="card">

<div
class="image-area"
onclick="openModal(${index})">

<img src="${product.image1}">

</div>

<div class="card-content">

<div
class="product-title"
onclick="openModal(${index})">

${product.item}

</div>

<div class="meta">
Flavor: ${product.flavour}
</div>

<div class="meta">
Size: ${product.size}
</div>

<div class="price">
₹${product.price}
</div>

<div class="stock ${product.stock.toLowerCase().includes('out') ? 'outstock' : 'instock'}">
${product.stock}
</div>

<ul class="bullets">

${product.bullets.map(b=>`<li>${b}</li>`).join("")}

</ul>

<button
class="card-btn"
onclick="openModal(${index})"
style="
${product.stock.toLowerCase().includes('out')
?
'background:#999;cursor:not-allowed;'
:
''}
">

${product.stock.toLowerCase().includes('out')
?
'Out Of Stock'
:
'View Product'}

</button>

</div>

</div>

`;

});

}

/* ===============================
SEARCH
=============================== */

function showSuggestions(){

const text =
document.getElementById("searchInput")
.value.toLowerCase();

const suggestions =
document.getElementById("suggestions");

if(text.length===0){

suggestions.style.display =
"none";

return;

}

const matches =
allProducts.filter(product=>

product.item.toLowerCase().includes(text)

).slice(0,8);

suggestions.innerHTML =

matches.map(product=>

`<div
class="suggestion-item"
onclick="pickSuggestion('${product.item}')">

${product.item}

</div>`

).join("");

suggestions.style.display =
"block";

}

function pickSuggestion(name){

document.getElementById("searchInput")
.value = name;

searchProducts();

}

function searchProducts(){

const text =
document.getElementById("searchInput")
.value.toLowerCase();

filteredProducts =
allProducts.filter(product=>

product.item.toLowerCase().includes(text)

||

product.brand.toLowerCase().includes(text)

||

product.mainCategory.toLowerCase().includes(text)

);

renderProducts();

document.getElementById("suggestions")
.style.display = "none";

}

/* ===============================
MODAL
=============================== */

function openModal(index){

const group =
groupedProducts[index];

window.currentGroup =
group;

window.selectedProduct =
group[0];

document.getElementById("modal")
.style.display = "flex";

updateModal(group[0]);

const dropdown =
document.getElementById("flavourDropdown");

dropdown.innerHTML =

group.map((item,index)=>

`<option value="${index}">
${item.flavour}
</option>`

).join("");

dropdown.onchange = function(){

const selected =
group[this.value];

window.selectedProduct =
selected;

updateModal(selected);

};

}

function updateModal(product){

document.getElementById("mainImage")
.src = product.image1;

document.getElementById("modalTitle")
.innerText = product.item;

document.getElementById("modalPrice")
.innerText = `₹${product.price}`;

document.getElementById("modalStock")
.innerText = product.stock;

document.getElementById("modalStock")
.className =
`stock ${product.stock.toLowerCase().includes('out') ? 'outstock' : 'instock'}`;

document.getElementById("modalSize")
.innerText =
`Size: ${product.size}`;

document.getElementById("modalFlavor")
.innerText =
`Flavor: ${product.flavour}`;

document.getElementById("modalBullets")
.innerHTML =

product.bullets.map(b=>
`<li>${b}</li>`
).join("");

document.getElementById("thumbs")
.innerHTML =

`

<img
class="thumb"
src="${product.image1}"
onclick="changeImage('${product.image1}')">

<img
class="thumb"
src="${product.image2}"
onclick="changeImage('${product.image2}')">

<img
class="thumb"
src="${product.image3}"
onclick="changeImage('${product.image3}')">

`;

const btn =
document.getElementById("orderButton");

if(product.stock.toLowerCase().includes("out")){

btn.disabled = true;
btn.innerText = "Out Of Stock";
btn.style.background = "#999";

}else{

btn.disabled = false;
btn.innerText = "Order on WhatsApp";
btn.style.background = "#25D366";

}

btn.onclick = function(){

if(product.stock.toLowerCase().includes("out")) return;

const message =

`Hello,

I want to order:

${product.item}

Flavor:
${product.flavour}

Size:
${product.size}

Price:
₹${product.price}

Please share payment details.`;

window.open(

`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(message)}`,

"_blank"

);

};

}

function changeImage(src){

document.getElementById("mainImage")
.src = src;

}

function closeModal(){

document.getElementById("modal")
.style.display = "none";

}

/* ===============================
SIDEBAR
=============================== */

function openSidebar(){

document.getElementById("sidebar")
.classList.add("active");

}

function closeSidebar(){

document.getElementById("sidebar")
.classList.remove("active");

}

/* ===============================
START
=============================== */

loadProducts();

</script>

</body>
</html>
