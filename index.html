<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AL HAYAT TRADING</title>

<link rel="icon" type="image/png" href="https://i.postimg.cc/Y9K0Qw1S/logo.png">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
color:#fff;
font-family:'Manrope',sans-serif;
overflow-x:hidden;
}

body::-webkit-scrollbar{
width:8px;
}

body::-webkit-scrollbar-thumb{
background:#333;
border-radius:10px;
}

h1,h2,h3,h4,h5{
font-family:'Cinzel',serif;
letter-spacing:1px;
}

.topbar{
position:sticky;
top:0;
z-index:9999;
background:rgba(0,0,0,0.94);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.top-inner{
max-width:1700px;
margin:auto;
display:flex;
align-items:center;
justify-content:space-between;
padding:14px 24px;
gap:18px;
}

.brand{
display:flex;
align-items:center;
gap:14px;
cursor:pointer;
}

.brand img{
width:68px;
height:68px;
object-fit:contain;
filter:drop-shadow(0 0 10px rgba(255,255,255,0.12));
}

.brand-text h1{
font-size:28px;
font-weight:700;
line-height:1;
}

.brand-text p{
font-size:11px;
letter-spacing:4px;
margin-top:6px;
opacity:0.7;
}

.contact-top{
font-size:18px;
font-weight:700;
color:#25D366;
font-family:'Cinzel',serif;
}

.banner{
width:100%;
height:420px;
overflow:hidden;
position:relative;
}

.banner img{
width:100%;
height:100%;
object-fit:cover;
}

.controls-wrap{
position:sticky;
top:97px;
z-index:999;
background:#090909;
padding:16px;
display:flex;
justify-content:center;
align-items:center;
gap:12px;
flex-wrap:wrap;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.filter-btn{
padding:12px 20px;
border:none;
border-radius:999px;
background:#151515;
color:#fff;
font-weight:700;
cursor:pointer;
transition:0.3s;
font-family:'Manrope',sans-serif;
}

.filter-btn.active,
.filter-btn:hover{
background:#fff;
color:#000;
}

.search{
width:420px;
max-width:90vw;
padding:14px 18px;
border:none;
outline:none;
border-radius:999px;
background:#141414;
color:#fff;
font-size:15px;
}

.section{
padding:34px 18px;
max-width:1700px;
margin:auto;
}

.section-head{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:18px;
}

.section-head h2{
font-size:34px;
}

.arrow-wrap{
display:flex;
gap:10px;
}

.arrow-btn{
width:42px;
height:42px;
border:none;
border-radius:50%;
background:#181818;
color:#fff;
cursor:pointer;
font-size:20px;
}

.row-scroll{
display:flex;
gap:18px;
overflow-x:auto;
scroll-behavior:smooth;
padding-bottom:10px;
}

.row-scroll::-webkit-scrollbar{
height:4px;
}

.row-scroll::-webkit-scrollbar-thumb{
background:#444;
border-radius:10px;
}

.product-card{
min-width:245px;
max-width:245px;
background:#101010;
border:1px solid rgba(255,255,255,0.06);
border-radius:24px;
padding:18px;
cursor:pointer;
transition:0.3s;
}

.product-card:hover{
transform:translateY(-6px);
border-color:rgba(255,255,255,0.15);
}

.product-card img{
width:100%;
height:240px;
object-fit:contain;
background:#fff;
border-radius:18px;
padding:10px;
}

.brand-name{
margin-top:14px;
font-size:12px;
letter-spacing:2px;
color:#c9c9c9;
text-transform:uppercase;
}

.product-title{
font-size:16px;
font-weight:700;
line-height:1.4;
margin-top:10px;
min-height:66px;
}

.product-price{
font-size:24px;
font-weight:700;
margin-top:10px;
}

.stock{
margin-top:8px;
font-size:13px;
font-weight:700;
}

.instock{
color:#2ecc71;
}

.outstock{
color:#ff4d4d;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.92);
z-index:999999;
display:none;
align-items:center;
justify-content:center;
padding:18px;
}

.modal-content{
width:100%;
max-width:1280px;
background:#0d0d0d;
border-radius:28px;
padding:26px;
max-height:94vh;
overflow-y:auto;
position:relative;
}

.close-modal{
position:absolute;
right:18px;
top:10px;
font-size:36px;
cursor:pointer;
}

.detail-wrap{
display:grid;
grid-template-columns:1fr 1fr;
gap:26px;
}

.main-image-wrap{
background:#fff;
height:520px;
border-radius:24px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
padding:18px;
}

.main-image{
max-width:100%;
max-height:100%;
object-fit:contain;
cursor:zoom-in;
}

.img-nav{
position:absolute;
top:50%;
transform:translateY(-50%);
width:46px;
height:46px;
border:none;
border-radius:50%;
background:rgba(0,0,0,0.72);
color:#fff;
font-size:22px;
cursor:pointer;
}

.prev-img{
left:14px;
}

.next-img{
right:14px;
}

.thumb-row{
display:flex;
gap:10px;
margin-top:16px;
}

.thumb-row img{
width:82px;
height:82px;
object-fit:contain;
background:#fff;
padding:8px;
border-radius:12px;
cursor:pointer;
}

.details-side h2{
font-size:40px;
line-height:1.1;
}

.detail-price{
font-size:38px;
font-weight:700;
margin-top:14px;
}

.serving-box{
display:inline-block;
margin-top:14px;
padding:10px 16px;
border-radius:999px;
background:#171717;
font-weight:700;
}

.option-title{
margin-top:24px;
margin-bottom:12px;
font-size:15px;
font-weight:700;
}

.option-grid{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.option-btn{
padding:10px 16px;
border-radius:999px;
border:1px solid rgba(255,255,255,0.08);
background:#151515;
color:#fff;
cursor:pointer;
font-weight:600;
}

.option-btn.active{
background:#fff;
color:#000;
}

.option-btn.out{
text-decoration:line-through;
opacity:0.4;
}

.bullet-list{
display:flex;
flex-direction:column;
gap:12px;
margin-top:24px;
}

.bullet-item{
background:#141414;
padding:14px;
border-radius:14px;
line-height:1.6;
}

.order-btn{
display:inline-flex;
align-items:center;
justify-content:center;
margin-top:24px;
padding:18px 28px;
background:#25D366;
color:#fff;
font-size:18px;
font-weight:700;
border-radius:18px;
}

.footer{
margin-top:60px;
padding:50px 20px;
text-align:center;
background:#080808;
border-top:1px solid rgba(255,255,255,0.08);
}

.footer h3{
font-size:30px;
margin-bottom:10px;
}

.footer p{
opacity:0.75;
margin-top:8px;
}

.floating-wa{
position:fixed;
right:22px;
bottom:22px;
width:72px;
height:72px;
border-radius:50%;
background:#25D366;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
z-index:99999;
box-shadow:0 0 25px rgba(37,211,102,0.5);
}

.zoom-view{
position:fixed;
inset:0;
background:rgba(0,0,0,0.96);
display:none;
align-items:center;
justify-content:center;
z-index:9999999;
}

.zoom-view img{
max-width:94vw;
max-height:94vh;
object-fit:contain;
}

@media(max-width:900px){

.detail-wrap{
grid-template-columns:1fr;
}

.main-image-wrap{
height:340px;
}

.details-side h2{
font-size:28px;
}

.detail-price{
font-size:30px;
}

.banner{
height:220px;
}

.brand-text h1{
font-size:20px;
}

.contact-top{
font-size:13px;
}

.controls-wrap{
top:84px;
}

}

</style>
</head>

<body>

<div class="topbar">
<div class="top-inner">

<div class="brand" onclick="scrollToTop()">
<img src="https://i.postimg.cc/Y9K0Qw1S/logo.png">

<div class="brand-text">
<h1>AL HAYAT TRADING</h1>
<p>PREMIUM IMPORTS</p>
</div>
</div>

<div class="contact-top">
📞 +91 93222 90988
</div>

</div>
</div>

<div class="banner">
<img src="https://i.postimg.cc/8z7w33L4/banner.jpg">
</div>

<div class="controls-wrap">

<button class="filter-btn active" onclick="setMode('featured',this)">
FEATURED DEALS
</button>

<button class="filter-btn" onclick="setMode('brand',this)">
SHOP BY BRAND
</button>

<button class="filter-btn" onclick="setMode('category',this)">
SHOP BY CATEGORY
</button>

<input type="text" class="search" placeholder="Search Products..." oninput="searchProducts(this.value)">

</div>

<div id="mainContainer"></div>

<div class="footer">
<h3>AL HAYAT TRADING</h3>
<p>Premium Imported Sports Nutrition & Wellness Products</p>
<p>Mumbai, India</p>
<p>📞 +91 93222 90988</p>
</div>

<a class="floating-wa" href="https://wa.me/919322290988" target="_blank">
💬
</a>

<div class="modal" id="productModal">
<div class="modal-content" id="modalContent"></div>
</div>

<div class="zoom-view" id="zoomView" onclick="closeZoom()">
<img id="zoomImg">
</div>

<script>

let rawProducts=[];
let groupedProducts=[];
let currentMode='featured';

Papa.parse('products.csv',{
download:true,
header:true,
skipEmptyLines:true,
complete:function(results){

rawProducts=results.data;

groupProducts();

renderPage();

}
});

function groupProducts(){

const map={};

rawProducts.forEach(p=>{

const key=(p.ITEM||'').trim();

if(!map[key]){

map[key]={
main:p,
variants:[]
};

}

map[key].variants.push(p);

});

groupedProducts=Object.values(map);

}

function randomize(arr){

return [...arr].sort(()=>Math.random()-0.5);

}

function renderPage(){

const container=document.getElementById('mainContainer');

container.innerHTML='';

if(currentMode==='featured') renderFeatured(container);

if(currentMode==='brand') renderBrands(container);

if(currentMode==='category') renderCategories(container);

}

function renderFeatured(container){

const section=document.createElement('div');

section.className='section';

section.innerHTML=`
<div class="section-head">

<h2>FEATURED DEALS</h2>

<div class="arrow-wrap">
<button class="arrow-btn" onclick="slideRow('featuredRow',-400)">❮</button>
<button class="arrow-btn" onclick="slideRow('featuredRow',400)">❯</button>
</div>

</div>

<div class="row-scroll" id="featuredRow">

${randomize(groupedProducts).slice(0,25).map(g=>createCard(g.main)).join('')}

</div>
`;

container.appendChild(section);

attachCardEvents();

}

function renderBrands(container){

const brands=[...new Set(groupedProducts.map(x=>x.main.BRAND).filter(Boolean))];

brands.forEach(brand=>{

const rowId=brand.replace(/\s/g,'');

const items=randomize(groupedProducts.filter(x=>x.main.BRAND===brand));

const section=document.createElement('div');

section.className='section';

section.innerHTML=`
<div class="section-head">

<h2>${brand}</h2>

<div class="arrow-wrap">
<button class="arrow-btn" onclick="slideRow('${rowId}',-400)">❮</button>
<button class="arrow-btn" onclick="slideRow('${rowId}',400)">❯</button>
</div>

</div>

<div class="row-scroll" id="${rowId}">
${items.map(g=>createCard(g.main)).join('')}
</div>
`;

container.appendChild(section);

});

attachCardEvents();

}

function renderCategories(container){

const cats=[...new Set(groupedProducts.map(x=>x.main.Category).filter(Boolean))];

cats.forEach(cat=>{

const rowId=cat.replace(/\s/g,'');

const items=randomize(groupedProducts.filter(x=>x.main.Category===cat));

const section=document.createElement('div');

section.className='section';

section.innerHTML=`
<div class="section-head">

<h2>${cat}</h2>

<div class="arrow-wrap">
<button class="arrow-btn" onclick="slideRow('${rowId}',-400)">❮</button>
<button class="arrow-btn" onclick="slideRow('${rowId}',400)">❯</button>
</div>

</div>

<div class="row-scroll" id="${rowId}">
${items.map(g=>createCard(g.main)).join('')}
</div>
`;

container.appendChild(section);

});

attachCardEvents();

}

function createCard(product){

const img=
product.IMAGE1_FRONT ||
product.IMAGE2_SIDE ||
product.IMAGE3_BACK ||
'https://via.placeholder.com/300';

return `
<div class="product-card" data-item="${product.ITEM}">

<img src="${img}" onerror="this.src='https://via.placeholder.com/300'">

<div class="brand-name">${product.BRAND||''}</div>

<div class="product-title">${product.ITEM||''}</div>

<div class="product-price">
${product.PRICE ? '₹'+product.PRICE : 'OUT OF STOCK'}
</div>

<div class="stock ${product.STOCK==='In Stock'?'instock':'outstock'}">
${product.STOCK||''}
</div>

</div>
`;

}

function attachCardEvents(){

document.querySelectorAll('.product-card').forEach(card=>{

card.onclick=()=>openProduct(card.dataset.item);

});

}

function openProduct(item){

const group=groupedProducts.find(g=>g.main.ITEM===item);

if(!group) return;

renderModal(group.variants[0],group.variants);

document.getElementById('productModal').style.display='flex';

}

function renderModal(product,variants){

const modal=document.getElementById('modalContent');

const images=[
product.IMAGE1_FRONT,
product.IMAGE2_SIDE,
product.IMAGE3_BACK
].filter(Boolean).filter(x=>!x.includes('undefined'));

const sizes=[...new Set(variants.map(v=>v.Size).filter(Boolean))];

const flavours=[...new Set(variants.map(v=>v.FLAVOUR).filter(Boolean))];

modal.innerHTML=`

<div class="close-modal" onclick="closeModal()">×</div>

<div class="detail-wrap">

<div>

<div class="main-image-wrap">

<button class="img-nav prev-img" onclick="changeImage(-1)">❮</button>

<img class="main-image"
id="mainProductImage"
src="${images[0]||'https://via.placeholder.com/500'}"
onclick="zoomImage(this.src)">

<button class="img-nav next-img" onclick="changeImage(1)">❯</button>

</div>

<div class="thumb-row">

${images.map(img=>`
<img src="${img}" onclick="setMainImage('${img}')">
`).join('')}

</div>

</div>

<div class="details-side">

<h2>${product.ITEM}</h2>

<div class="detail-price">
${product.PRICE ? '₹'+product.PRICE : 'OUT OF STOCK'}
</div>

<div class="serving-box">
SERVINGS : ${product.SERVINGS||'-'}
</div>

<div class="option-title">
AVAILABLE SIZES
</div>

<div class="option-grid">

${sizes.map(size=>{

const exists=variants.find(v=>v.Size===size && v.STOCK==='In Stock');

return `
<button class="option-btn ${size===product.Size?'active':''} ${!exists?'out':''}"
onclick="selectVariant('${size}','size','${product.ITEM}')">
${size}
</button>
`;

}).join('')}

</div>

<div class="option-title">
AVAILABLE FLAVOURS
</div>

<div class="option-grid">

${flavours.map(fl=>{

const exists=variants.find(v=>v.FLAVOUR===fl && v.STOCK==='In Stock');

return `
<button class="option-btn ${fl===product.FLAVOUR?'active':''} ${!exists?'out':''}"
onclick="selectVariant('${fl}','flavour','${product.ITEM}')">
${fl}
</button>
`;

}).join('')}

</div>

<div class="bullet-list">

${product.BULLET1?`<div class="bullet-item">• ${product.BULLET1}</div>`:''}
${product.BULLET2?`<div class="bullet-item">• ${product.BULLET2}</div>`:''}
${product.BULLET3?`<div class="bullet-item">• ${product.BULLET3}</div>`:''}
${product.BULLET4?`<div class="bullet-item">• ${product.BULLET4}</div>`:''}

</div>

<a class="order-btn"
href="https://wa.me/919322290988?text=Hi%20I%20want%20to%20order%20${encodeURIComponent(product.ITEM)}"
target="_blank">

ORDER ON WHATSAPP

</a>

</div>

</div>
`;

window.currentImages=images;
window.currentIndex=0;

}

function selectVariant(value,type,item){

const group=groupedProducts.find(g=>g.main.ITEM===item);

if(!group) return;

let found;

if(type==='size'){

found=group.variants.find(v=>v.Size===value);

}else{

found=group.variants.find(v=>v.FLAVOUR===value);

}

if(found){

renderModal(found,group.variants);

}

}

function setMainImage(src){

document.getElementById('mainProductImage').src=src;

window.currentIndex=window.currentImages.indexOf(src);

}

function changeImage(dir){

window.currentIndex+=dir;

if(window.currentIndex<0){

window.currentIndex=window.currentImages.length-1;

}

if(window.currentIndex>=window.currentImages.length){

window.currentIndex=0;

}

document.getElementById('mainProductImage').src=
window.currentImages[window.currentIndex];

}

document.addEventListener('keydown',e=>{

if(document.getElementById('productModal').style.display==='flex'){

if(e.key==='ArrowRight') changeImage(1);

if(e.key==='ArrowLeft') changeImage(-1);

}

});

function closeModal(){

document.getElementById('productModal').style.display='none';

}

function zoomImage(src){

document.getElementById('zoomView').style.display='flex';

document.getElementById('zoomImg').src=src;

}

function closeZoom(){

document.getElementById('zoomView').style.display='none';

}

function slideRow(id,amount){

document.getElementById(id).scrollBy({
left:amount,
behavior:'smooth'
});

}

function setMode(mode,el){

currentMode=mode;

document.querySelectorAll('.filter-btn').forEach(btn=>{
btn.classList.remove('active');
});

el.classList.add('active');

renderPage();

}

function searchProducts(text){

text=text.toLowerCase();

document.querySelectorAll('.product-card').forEach(card=>{

card.style.display=
card.dataset.item.toLowerCase().includes(text)
?'block'
:'none';

});

}

function scrollToTop(){

window.scrollTo({
top:0,
behavior:'smooth'
});

}

</script>

</body>
</html>
