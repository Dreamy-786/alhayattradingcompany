<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AL HAYAT TRADING</title>

<link rel="icon" href="https://i.postimg.cc/Y9K0Qw1S/logo.png">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#fff;
font-family:'Inter',sans-serif;
overflow-x:hidden;
}

h1,h2,h3,h4{
font-family:'Cormorant Garamond',serif;
font-weight:600;
}

img{
max-width:100%;
display:block;
}

.topbar{
position:sticky;
top:0;
z-index:9999;
background:#000;
border-bottom:1px solid rgba(255,255,255,.08);
}

.top-inner{
max-width:1600px;
margin:auto;
padding:18px 28px;
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
}

.brand{
display:flex;
align-items:center;
gap:18px;
cursor:pointer;
}

.brand img{
width:72px;
height:72px;
border-radius:18px;
object-fit:cover;
}

.brand-text h1{
font-size:62px;
line-height:0.9;
letter-spacing:1px;
}

.brand-text p{
font-size:15px;
letter-spacing:6px;
margin-top:10px;
opacity:.8;
}

.contact{
font-size:22px;
font-weight:700;
color:#2cff71;
font-family:'Cormorant Garamond',serif;
}

.hero-banner{
width:100%;
height:340px;
overflow:hidden;
background:#111;
}

.banner-image{
width:100%;
height:100%;
object-fit:cover;
}

.filters{
position:sticky;
top:110px;
z-index:999;
background:#000;
padding:22px;
display:flex;
gap:18px;
align-items:center;
flex-wrap:wrap;
border-bottom:1px solid rgba(255,255,255,.08);
}

.filter-btn{
padding:18px 34px;
border:none;
border-radius:999px;
background:#111;
color:#fff;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:.25s;
}

.filter-btn.active{
background:#fff;
color:#000;
}

.search{
flex:1;
min-width:280px;
padding:18px 26px;
border-radius:999px;
border:none;
background:#111;
color:#fff;
font-size:18px;
outline:none;
}

.section{
padding:40px 24px;
}

.section-title{
font-size:72px;
margin-bottom:30px;
}

.slider-head{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.slider-arrows{
display:flex;
gap:14px;
}

.arrow{
width:58px;
height:58px;
border-radius:50%;
background:#111;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
}

.horizontal-row{
display:flex;
gap:22px;
overflow-x:auto;
scroll-behavior:smooth;
padding-bottom:10px;
}

.horizontal-row::-webkit-scrollbar{
display:none;
}

.product-card{
min-width:320px;
background:#0e0e0e;
border-radius:26px;
padding:18px;
transition:.25s;
border:1px solid rgba(255,255,255,.06);
}

.product-card:hover{
transform:translateY(-6px);
}

.product-image{
width:100%;
height:260px;
object-fit:contain;
background:#fff;
padding:12px;
border-radius:18px;
}

.product-title{
font-size:26px;
margin-top:18px;
line-height:1.1;
min-height:68px;
}

.brand-name{
margin-top:10px;
opacity:.65;
font-size:14px;
letter-spacing:2px;
}

.price{
font-size:36px;
font-weight:800;
margin-top:14px;
}

.stock{
margin-top:8px;
font-size:15px;
font-weight:700;
}

.instock{
color:#30ff77;
}

.outstock{
color:#ff4747;
text-decoration:line-through;
}

.view-btn{
margin-top:20px;
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:#fff;
color:#000;
font-size:16px;
font-weight:700;
cursor:pointer;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.82);
display:none;
justify-content:center;
align-items:center;
z-index:99999;
padding:20px;
}

.detail-modal{
width:95%;
max-width:1450px;
height:92vh;
background:#fff;
color:#000;
border-radius:34px;
overflow:hidden;
position:relative;
}

.close-btn{
position:absolute;
right:24px;
top:18px;
font-size:54px;
cursor:pointer;
z-index:10;
}

.detail-content{
height:100%;
overflow-y:auto;
padding:34px;
display:grid;
grid-template-columns:1fr 1fr;
gap:34px;
}

.detail-left{
position:relative;
}

.detail-main-image{
width:100%;
height:520px;
object-fit:contain;
background:#fff;
border-radius:24px;
padding:20px;
}

.gallery{
display:flex;
gap:14px;
margin-top:18px;
}

.thumb{
width:90px;
height:90px;
border-radius:16px;
border:2px solid #ddd;
padding:6px;
object-fit:contain;
cursor:pointer;
background:#fff;
}

.image-nav{
position:absolute;
top:42%;
transform:translateY(-50%);
width:58px;
height:58px;
border-radius:50%;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:pointer;
box-shadow:0 10px 30px rgba(0,0,0,.12);
}

.prev{
left:-10px;
}

.next{
right:-10px;
}

.detail-title{
font-size:56px;
line-height:1;
}

.detail-price{
font-size:72px;
font-weight:900;
margin-top:20px;
}

.option-title{
font-size:22px;
font-weight:800;
margin-top:26px;
margin-bottom:14px;
}

.options{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.option-btn{
padding:12px 18px;
border-radius:12px;
border:1px solid #ccc;
background:#fff;
cursor:pointer;
font-weight:700;
}

.option-btn.out{
text-decoration:line-through;
opacity:.45;
}

.order-btn{
display:flex;
align-items:center;
justify-content:center;
margin-top:28px;
width:100%;
padding:22px;
border-radius:18px;
background:#25D366;
color:#fff;
font-size:24px;
font-weight:900;
text-decoration:none;
}

.whatsapp-float{
position:fixed;
right:24px;
bottom:24px;
width:78px;
height:78px;
border-radius:50%;
background:#25D366;
display:flex;
align-items:center;
justify-content:center;
font-size:36px;
z-index:99999;
box-shadow:0 0 30px rgba(37,211,102,.6);
}

.footer{
margin-top:70px;
padding:50px 24px;
background:#080808;
border-top:1px solid rgba(255,255,255,.08);
text-align:center;
}

.footer h2{
font-size:42px;
margin-bottom:16px;
}

.footer p{
opacity:.7;
margin-top:8px;
}

@media(max-width:900px){

.brand-text h1{
font-size:38px;
}

.contact{
font-size:18px;
}

.hero-banner{
height:180px;
}

.filters{
top:92px;
}

.section-title{
font-size:42px;
}

.product-card{
min-width:260px;
}

.detail-content{
grid-template-columns:1fr;
padding:20px;
}

.detail-main-image{
height:300px;
}

.detail-title{
font-size:34px;
}

.detail-price{
font-size:48px;
}

.order-btn{
position:sticky;
bottom:0;
}

}

</style>
</head>

<body>

<header class="topbar">

<div class="top-inner">

<div class="brand" onclick="window.scrollTo({top:0,behavior:'smooth'})">

<img src="https://i.postimg.cc/Y9K0Qw1S/logo.png">

<div class="brand-text">
<h1>AL HAYAT TRADING</h1>
<p>PREMIUM IMPORTS</p>
</div>

</div>

<div class="contact">
📞 +91 93222 90988
</div>

</div>

</header>

<section class="hero-banner">

<img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?q=80&w=1600&auto=format&fit=crop"
class="banner-image">

</section>

<div class="filters">

<button class="filter-btn active">FEATURED DEALS</button>

<button class="filter-btn">SHOP BY BRAND</button>

<button class="filter-btn">SHOP BY CATEGORY</button>

<input type="text" class="search" placeholder="Search Products...">

</div>

<section class="section">

<div class="slider-head">

<h2 class="section-title">FEATURED DEALS</h2>

<div class="slider-arrows">
<div class="arrow" onclick="scrollLeftRow()">‹</div>
<div class="arrow" onclick="scrollRightRow()">›</div>
</div>

</div>

<div class="horizontal-row" id="productsRow"></div>

</section>

<div class="modal" id="modal">

<div class="detail-modal">

<div class="close-btn" onclick="closeModal()">×</div>

<div class="detail-content">

<div class="detail-left">

<div class="image-nav prev" onclick="prevImage()">‹</div>
<div class="image-nav next" onclick="nextImage()">›</div>

<img id="mainImage" class="detail-main-image">

<div class="gallery" id="gallery"></div>

</div>

<div class="detail-right">

<h2 class="detail-title" id="detailTitle"></h2>

<div class="detail-price" id="detailPrice"></div>

<div class="option-title">Choose Flavor</div>
<div class="options" id="flavors"></div>

<div class="option-title">Choose Size</div>
<div class="options" id="sizes"></div>

<a href="https://wa.me/919322290988"
target="_blank"
class="order-btn">
Order On WhatsApp
</a>

</div>

</div>

</div>

</div>

<a href="https://wa.me/919322290988"
target="_blank"
class="whatsapp-float">
💬
</a>

<footer class="footer">

<h2>AL HAYAT TRADING</h2>

<p>Mumbai, India</p>
<p>Premium Imported Sports Nutrition & Wellness Products</p>
<p>WhatsApp: +91 93222 90988</p>

</footer>

<script>

let products = [];
let currentImages = [];
let currentImageIndex = 0;

Papa.parse("products.csv",{

download:true,
header:true,
skipEmptyLines:true,

complete:function(results){

products = results.data.filter(p =>
p.name &&
p.image &&
p.image.startsWith("http")
);

renderProducts(products);

}

});

function shuffle(arr){
return [...arr].sort(()=>0.5 - Math.random());
}

function renderProducts(data){

const row = document.getElementById("productsRow");

row.innerHTML = "";

shuffle(data).slice(0,25).forEach(product=>{

row.innerHTML += `

<div class="product-card">

<img src="${product.image}" class="product-image">

<h3 class="product-title">${product.name}</h3>

<div class="brand-name">${product.brand || ''}</div>

<div class="price">₹${product.price || ''}</div>

<div class="stock ${product.stock === 'Out Of Stock' ? 'outstock' : 'instock'}">
${product.stock || 'In Stock'}
</div>

<button class="view-btn"
onclick='openModal(${JSON.stringify(product)})'>
View Product
</button>

</div>

`;

});

}

function openModal(product){

document.getElementById("modal").style.display = "flex";

document.getElementById("detailTitle").innerText = product.name;

document.getElementById("detailPrice").innerText =
product.stock === "Out Of Stock"
?
"Out Of Stock"
:
"₹" + product.price;

currentImages = [
product.image,
product.image2,
product.image3
].filter(img => img && img.startsWith("http"));

currentImageIndex = 0;

updateMainImage();

const gallery = document.getElementById("gallery");

gallery.innerHTML = "";

currentImages.forEach(img=>{

gallery.innerHTML += `
<img src="${img}"
class="thumb"
onclick="setImage('${img}')">
`;

});

const flavors = document.getElementById("flavors");

const uniqueFlavours = [...new Set(
products
.filter(p => p.name === product.name)
.map(v => v.flavour)
.filter(v => v && !v.startsWith("http"))
)];

flavors.innerHTML = "";

uniqueFlavours.forEach(flavor=>{

const matching = products.find(p =>
p.flavour === flavor &&
p.name === product.name
);

flavors.innerHTML += `

<div class="option-btn ${matching.stock === 'Out Of Stock' ? 'out' : ''}">
${flavor}
</div>

`;

});

const sizes = document.getElementById("sizes");

const uniqueSizes = [...new Set(
products
.filter(p => p.name === product.name)
.map(v => v.size)
)];

sizes.innerHTML = "";

uniqueSizes.forEach(size=>{

sizes.innerHTML += `
<div class="option-btn">
${size}
</div>
`;

});

}

function closeModal(){
document.getElementById("modal").style.display = "none";
}

function setImage(img){

document.getElementById("mainImage").src = img;

}

function updateMainImage(){

document.getElementById("mainImage").src =
currentImages[currentImageIndex];

}

function nextImage(){

currentImageIndex++;

if(currentImageIndex >= currentImages.length){
currentImageIndex = 0;
}

updateMainImage();

}

function prevImage(){

currentImageIndex--;

if(currentImageIndex < 0){
currentImageIndex = currentImages.length - 1;
}

updateMainImage();

}

function scrollLeftRow(){

document.getElementById("productsRow")
.scrollBy({
left:-900,
behavior:'smooth'
});

}

function scrollRightRow(){

document.getElementById("productsRow")
.scrollBy({
left:900,
behavior:'smooth'
});

}

document.querySelector(".search")
.addEventListener("input",e=>{

const val = e.target.value.toLowerCase();

const filtered = products.filter(p =>
p.name.toLowerCase().includes(val)
);

renderProducts(filtered);

});

</script>

</body>
</html>
