.price{

.outstock{

.flavor-select{
width:100%;

border:1px solid #ccc;

font-size:15px;
}

.bullets{

margin-bottom:18px;
}

.bullets li{
margin-bottom:9px;

}

.order-btn{
width:100%;
padding:16px;
background:#25D366;
border:none;
border-radius:10px;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.order-btn:hover{
background:#1fb959;
}

/* =========================
MODAL
========================= */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
display:none;
align-items:center;
justify-content:center;
padding:20px;
z-index:9999;
}

.modal-content{
background:white;
width:100%;
max-width:1250px;
border-radius:20px;
overflow:hidden;
display:grid;
grid-template-columns:1fr 1fr;
position:relative;
max-height:95vh;
overflow-y:auto;
}

.modal-left{

.main-image{

.thumb-row{

.thumb{

height:90px;
border:2px solid #ddd;

}

.modal-right{

.modal-title{

line-height:1.4;

.close-btn{

/* =========================
FLOAT WHATSAPP

/* =========================

footer{

@media(max-width:900px){

}

}

}

.hero-content p{

}

.main-image{
height:350px;
}

.logo-area h1{

}

}

<script>

const WHATSAPP_NUMBER =
"917710077786";

/* =========================
PUT YOUR CSV LINK HERE
========================= */

const SHEET_CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQZimj_keJIooGDnz0sOvML4cjwbQ8eZBnQ3CQ1xyiORgHssrZPaCYzqdbFz-EmKmFrAqBgV6C3kLUK/pub?output=csv";

let allProducts = [];
let groupedProducts = [];
let activeCategory = "All";

/* =========================
AUTO BULLETS
========================= */

function generateBullets(title,category){

title = title.toLowerCase();
category = category.toLowerCase();

if(title.includes("isoflex")){

return [
"27g Whey Protein Isolate Per Serving",
"Ultra Fast Absorption Formula",
"Low Sugar & Low Fat Protein Blend",
"Supports Lean Muscle Recovery"
];

}

if(category.includes("hydrolyzed")){

return [
"Fast Digesting Hydrolyzed Protein",
"Supports Lean Muscle Recovery",
"Low Carb & Low Fat Formula",
"Premium Whey Protein Source"
];

}

if(category.includes("isolate")){

return [
"High Protein Isolate Formula",
"Supports Lean Muscle Growth",
"Low Sugar & Low Fat",
"Fast Absorption Protein Blend"
];

}

if(title.includes("creatine")){

return [
"Supports Strength & Power Output",
"Micronized Creatine Formula",
"Improves Workout Performance",
"Ideal For Daily Training"
];

}

if(title.includes("pre")){

return [
"Supports Workout Energy & Focus",
"Clinically Dosed Ingredients",
"Enhances Training Performance",
"Ideal Before Intense Workouts"
];

}

return [
"Premium Imported Supplement Formula",
"High Quality Sports Nutrition Product",
"Supports Fitness Goals",
"Trusted International Brand"
];

}

/* =========================
LOAD PRODUCTS
========================= */

async function loadProducts(){

const response =
await fetch(SHEET_CSV_URL);

const csv =
await response.text();

const rows =
csv.trim().split("\n").slice(1);

allProducts = [];

rows.forEach(row=>{

const cols =
row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

if(!cols || cols.length < 12) return;

const product = {

sku: cols[0].replace(/"/g,"").trim(),
brand: cols[1].replace(/"/g,"").trim(),
mainCategory: cols[2].replace(/"/g,"").trim(),
category: cols[3].replace(/"/g,"").trim(),
item: cols[4].replace(/"/g,"").trim(),
flavour: cols[5].replace(/"/g,"").trim(),
size: cols[6].replace(/"/g,"").trim(),
price: cols[7].replace(/"/g,"").trim(),
stock: cols[8].replace(/"/g,"").trim(),
image1: cols[9].replace(/"/g,"").trim(),
image2: cols[10].replace(/"/g,"").trim(),
image3: cols[11].replace(/"/g,"").trim()

};

product.bullets =
generateBullets(product.item,product.category);

allProducts.push(product);

});

renderCategories();
renderProducts();

}

/* =========================
RENDER CATEGORIES
========================= */

function renderCategories(){

const categories =
["All", ...new Set(allProducts.map(p=>p.mainCategory))];

document.getElementById("categoryBar")
.innerHTML =

categories.map(category=>

`<button
class="category-btn"
onclick="filterCategory('${category}')">

${category}

</button>`

).join("");

}

/* =========================
FILTER CATEGORY
========================= */

function filterCategory(category){

activeCategory = category;

renderProducts();

}

/* =========================
RENDER PRODUCTS
========================= */

function renderProducts(){

const container =
document.getElementById("products-container");

container.innerHTML = "";

let filtered =
allProducts;

if(activeCategory !== "All"){

filtered =
allProducts.filter(p=>
p.mainCategory === activeCategory
);

}

/* =========================
GROUP PRODUCTS
========================= */

const grouped = {};

filtered.forEach(product=>{

const key =
product.item;

if(!grouped[key]){

grouped[key] = [];

}

grouped[key].push(product);

});

groupedProducts =
Object.values(grouped);

groupedProducts.forEach((group,index)=>{

const first =
group[0];

container.innerHTML += `

<div
class="card searchable"
onclick="openModal(${index})">

<div class="image-wrapper">

<img
class="product-img"
src="${first.image1}">

</div>

<div class="card-content">

<div class="product-title">

${first.item}

</div>

<div class="meta">

Flavor: ${first.flavour}

</div>

<div class="meta">

Size: ${first.size}

</div>

<div class="price">

₹${first.price}

</div>

<div class="stock ${first.stock.toLowerCase().includes('out') ? 'outstock' : 'instock'}">

${first.stock}

</div>

<ul class="bullets">

${first.bullets.map(bullet=>
`<li>${bullet}</li>`
).join("")}

</ul>

<button
class="order-btn"
style="
${first.stock.toLowerCase().includes('out')
?
'background:#999;cursor:not-allowed;'
:
''}
">

${first.stock.toLowerCase().includes('out')
?
'Out Of Stock'
:
'View Product'}

</button>

</div>

</div>

`;

});

}

/* =========================
OPEN MODAL
========================= */

function openModal(index){

const group =
groupedProducts[index];

window.currentGroup =
group;

window.selectedVariant =
group[0];

document.getElementById("productModal")
.style.display = "flex";

updateModal(group[0]);

const dropdown =
document.getElementById("modalFlavorDropdown");

dropdown.innerHTML =

group.map((variant,index)=>

`<option value="${index}">
${variant.flavour}
</option>`

).join("");

dropdown.onchange = function(){

const selected =
group[this.value];

window.selectedVariant =
selected;

updateModal(selected);

};

}

/* =========================
UPDATE MODAL
========================= */

function updateModal(product){

document.getElementById("mainModalImage")
.src = product.image1;

document.getElementById("modalTitle")
.innerText = product.item;

document.getElementById("modalPrice")
.innerText = `₹${product.price}`;

document.getElementById("modalStock")
.innerText = product.stock;

document.getElementById("modalStock")
.className =
`stock ${product.stock.toLowerCase().includes('out') ? 'outstock' : 'instock'}`;

document.getElementById("modalSize")
.innerText =
`Size: ${product.size}`;

document.getElementById("modalFlavor")
.innerText =
`Flavor: ${product.flavour}`;

document.getElementById("modalBullets")
.innerHTML =

product.bullets.map(bullet=>
`<li>${bullet}</li>`
).join("");

document.getElementById("thumbRow")
.innerHTML =

`

<img
class="thumb"
src="${product.image1}"
onclick="changeImage('${product.image1}')">

<img
class="thumb"
src="${product.image2}"
onclick="changeImage('${product.image2}')">

<img
class="thumb"
src="${product.image3}"
onclick="changeImage('${product.image3}')">

`;

const btn =
document.getElementById("modalOrderBtn");

if(product.stock.toLowerCase().includes("out")){

btn.disabled = true;

btn.innerText =
"Out Of Stock";

btn.style.background =
"#999";

btn.style.cursor =
"not-allowed";

}else{

btn.disabled = false;

btn.innerText =
"Order on WhatsApp";

btn.style.background =
"#25D366";

btn.style.cursor =
"pointer";

}

}

/* =========================
CHANGE IMAGE
========================= */

function changeImage(image){

document.getElementById("mainModalImage")
.src = image;

}

/* =========================
ORDER
========================= */

function orderNow(){

const product =
window.selectedVariant;

if(product.stock.toLowerCase().includes("out")) return;

const message = `Hello,

I want to order:

${product.item}

Flavor:
${product.flavour}

Size:
${product.size}

Price:
₹${product.price}

Please share payment details.`;

window.open(

`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`,

"_blank"

);

}

/* =========================
SEARCH
========================= */

function searchProducts(){

const input =
document.getElementById("searchInput")
.value
.toLowerCase();

const cards =
document.querySelectorAll(".searchable");

cards.forEach(card=>{

const title =
card.querySelector(".product-title")
.innerText
.toLowerCase();

if(title.includes(input)){

card.style.display =
"block";

}else{

card.style.display =
"none";

}

});

}

/* =========================
CLOSE MODAL
========================= */

function closeModal(){

document.getElementById("productModal")
.style.display = "none";

}

window.onclick = function(event){

const modal =
document.getElementById("productModal");

if(event.target == modal){

closeModal();

}

}

/* =========================
START
========================= */

loadProducts();

</script>

</body>
