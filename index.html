<script>

let allProducts = [];
let groupedProducts = {};
let currentFilter = "assorted";
let currentModalImages = [];
let currentImageIndex = 0;
let lastScrollY = 0;

const VALID_IMAGE = (url) => {
    return url &&
    url.startsWith("http") &&
    !url.includes("undefined") &&
    !url.includes(".webp.webp");
};

async function loadCSV() {

    const response = await fetch("products.csv?v=" + Date.now());
    const csvText = await response.text();

    Papa.parse(csvText, {
        header: true,
        skipEmptyLines: true,

        complete: function(results) {

            allProducts = results.data.map(product => {

                const images = [
                    product.IMAGE1_FRONT,
                    product.IMAGE2_SIDE,
                    product.IMAGE3_BACK
                ].filter(img => VALID_IMAGE(img));

                return {
                    ...product,
                    images
                };
            });

            buildGroupedProducts();
            renderProducts();
            renderBrands();
            renderCategories();
        }
    });
}

function normalize(str) {
    return (str || "").trim().toLowerCase();
}

function buildGroupedProducts() {

    groupedProducts = {};

    allProducts.forEach(product => {

        const key =
            normalize(product.BRAND) +
            "|" +
            normalize(product.ITEM);

        if (!groupedProducts[key]) {
            groupedProducts[key] = [];
        }

        groupedProducts[key].push(product);
    });
}

function getUniqueCards() {

    const cards = [];

    Object.values(groupedProducts).forEach(group => {

        const uniqueSizes = {};

        group.forEach(product => {

            const size = normalize(product.Size);

            if (!uniqueSizes[size]) {
                uniqueSizes[size] = product;
            }
        });

        Object.values(uniqueSizes).forEach(p => cards.push(p));
    });

    return cards;
}

function renderProducts(products = null) {

    const container = document.getElementById("products-container");

    const finalProducts = products || getUniqueCards();

    container.innerHTML = "";

    finalProducts.forEach(product => {

        const image = product.images[0] || "https://via.placeholder.com/300x300";

        container.innerHTML += `
        <div class="product-card">

            <div class="product-image-wrap">

                <img
                    src="${image}"
                    class="product-image"
                    loading="lazy"
                    onclick="openModal('${product.SKU}')"
                >

            </div>

            <div class="product-brand">
                ${product.BRAND || ""}
            </div>

            <div class="product-title">
                ${product.ITEM || ""}
            </div>

            <div class="product-price">
                ${product.PRICE ? "₹" + product.PRICE : ""}
            </div>

            <div class="${product.STOCK === 'In Stock' ? 'stock-green' : 'stock-red'}">
                ${product.STOCK || ""}
            </div>

            <button
                class="view-btn"
                onclick="openModal('${product.SKU}')"
            >
                View Product
            </button>

        </div>
        `;
    });
}

function openModal(sku) {

    lastScrollY = window.scrollY;

    const product = allProducts.find(p => p.SKU === sku);

    if (!product) return;

    const key =
        normalize(product.BRAND) +
        "|" +
        normalize(product.ITEM);

    const variants = groupedProducts[key];

    const uniqueFlavours = [...new Map(
        variants.map(v => [normalize(v.FLAVOUR), v])
    ).values()];

    const uniqueSizes = [...new Map(
        variants.map(v => [normalize(v.Size), v])
    ).values()];

    currentModalImages = product.images;
    currentImageIndex = 0;

    document.getElementById("modal").style.display = "flex";

    renderModalImage();

    document.getElementById("modal-content").innerHTML = `

    <div class="modal-layout">

        <div class="modal-left">

            <div class="modal-image-box">

                <button class="img-arrow left" onclick="prevImage()">‹</button>

                <img id="main-modal-image" class="main-modal-image">

                <button class="img-arrow right" onclick="nextImage()">›</button>

            </div>

            <div class="thumbs">
                ${currentModalImages.map((img, i) => `
                    <img
                        src="${img}"
                        onclick="changeImage(${i})"
                        class="thumb"
                    >
                `).join("")}
            </div>

        </div>

        <div class="modal-right">

            <h1>${product.ITEM}</h1>

            <div class="modal-price">
                ${product.PRICE ? "₹" + product.PRICE : ""}
            </div>

            <div class="${product.STOCK === 'In Stock' ? 'stock-green' : 'stock-red'}">
                ${product.STOCK}
            </div>

            <div class="modal-meta">
                <b>Servings:</b> ${product.SERVINGS || "-"}
            </div>

            <div class="modal-meta">
                <b>Size:</b> ${product.Size || "-"}
            </div>

            <div class="modal-meta">
                <b>Flavour:</b> ${product.FLAVOUR || "-"}
            </div>

            <div class="variant-title">
                Flavours
            </div>

            <div class="variant-wrap">

                ${uniqueFlavours.map(v => {

                    const out = v.STOCK !== "In Stock";

                    return `
                    <button
                        class="variant-btn ${out ? 'disabled-variant' : ''}"
                        onclick="openModal('${v.SKU}')"
                    >
                        ${v.FLAVOUR || "N/A"}
                    </button>
                    `;
                }).join("")}

            </div>

            <div class="variant-title">
                Sizes
            </div>

            <div class="variant-wrap">

                ${uniqueSizes.map(v => {

                    const out = v.STOCK !== "In Stock";

                    return `
                    <button
                        class="variant-btn ${out ? 'disabled-variant' : ''}"
                        onclick="openModal('${v.SKU}')"
                    >
                        ${v.Size || "N/A"}
                    </button>
                    `;
                }).join("")}

            </div>

            <ul class="bullets">
                ${[
                    product.BULLET1,
                    product.BULLET2,
                    product.BULLET3,
                    product.BULLET4
                ]
                .filter(Boolean)
                .map(b => `<li>${b}</li>`)
                .join("")}
            </ul>

            <a
                href="https://wa.me/917700777786?text=Hi,%20I%20want%20to%20order%20${encodeURIComponent(product.ITEM)}"
                target="_blank"
                class="order-btn"
            >
                ORDER NOW ON WHATSAPP
            </a>

        </div>

    </div>
    `;
}

function closeModal() {

    document.getElementById("modal").style.display = "none";

    window.scrollTo({
        top: lastScrollY,
        behavior: "instant"
    });
}

function renderModalImage() {

    const img = document.getElementById("main-modal-image");

    if (img && currentModalImages[currentImageIndex]) {
        img.src = currentModalImages[currentImageIndex];
    }
}

function changeImage(index) {
    currentImageIndex = index;
    renderModalImage();
}

function prevImage() {

    currentImageIndex--;

    if (currentImageIndex < 0) {
        currentImageIndex = currentModalImages.length - 1;
    }

    renderModalImage();
}

function nextImage() {

    currentImageIndex++;

    if (currentImageIndex >= currentModalImages.length) {
        currentImageIndex = 0;
    }

    renderModalImage();
}

document.addEventListener("keydown", function(e){

    if(document.getElementById("modal").style.display !== "flex") return;

    if(e.key === "ArrowLeft") prevImage();
    if(e.key === "ArrowRight") nextImage();
});

function renderBrands() {

    const brands = [...new Set(allProducts.map(p => p.BRAND).filter(Boolean))];

    const wrap = document.getElementById("brand-slider");

    wrap.innerHTML = brands.map(b => `
        <button class="filter-chip" onclick="filterBrand('${b}')">
            ${b}
        </button>
    `).join("");
}

function renderCategories() {

    const cats = [...new Set(allProducts.map(p => p.Category).filter(Boolean))];

    const wrap = document.getElementById("category-slider");

    wrap.innerHTML = cats.map(c => `
        <button class="filter-chip" onclick="filterCategory('${c}')">
            ${c}
        </button>
    `).join("");
}

function filterBrand(brand) {

    const filtered = getUniqueCards().filter(p => p.BRAND === brand);

    renderProducts(filtered);
}

function filterCategory(cat) {

    const filtered = getUniqueCards().filter(p => p.Category === cat);

    renderProducts(filtered);
}

function searchProducts() {

    const q = document.getElementById("searchInput").value.toLowerCase();

    const filtered = getUniqueCards().filter(p =>
        (p.ITEM || "").toLowerCase().includes(q) ||
        (p.BRAND || "").toLowerCase().includes(q)
    );

    renderProducts(filtered);
}

window.onclick = function(event) {

    const modal = document.getElementById("modal");

    if (event.target === modal) {
        closeModal();
    }
}

loadCSV();

</script>



<style>

@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap');

*{
    font-family:'Inter',sans-serif;
}

body{
    background:#f6f3ee;
    margin:0;
    overflow-x:hidden;
}

h1,h2,h3,.product-title{
    font-family:'Cormorant Garamond',serif;
}

.topbar{

    position:sticky;
    top:0;
    z-index:999;
    background:white;
    padding:14px 20px;
    display:flex;
    align-items:center;
    gap:15px;
    box-shadow:0 2px 12px rgba(0,0,0,0.08);
}

.logo{
    height:54px;
    width:auto;
    object-fit:contain;
}

.search{
    flex:1;
    height:48px;
    border-radius:14px;
    border:none;
    background:#f1f1f1;
    padding:0 20px;
    font-size:15px;
}

.products-grid{

    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:22px;
    padding:30px;
}

.product-card{

    background:white;
    border-radius:22px;
    padding:18px;
    transition:.3s;
    box-shadow:0 4px 14px rgba(0,0,0,0.06);
}

.product-card:hover{
    transform:translateY(-6px);
}

.product-image-wrap{

    height:240px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.product-image{

    max-width:100%;
    max-height:220px;
    object-fit:contain;
    cursor:pointer;
}

.product-brand{

    font-size:11px;
    letter-spacing:1.5px;
    color:#777;
    margin-top:14px;
}

.product-title{

    font-size:22px;
    min-height:70px;
}

.product-price{

    font-size:28px;
    font-weight:700;
    margin-top:12px;
}

.stock-green{
    color:#008f3d;
}

.stock-red{
    color:#c62828;
}

.view-btn,
.order-btn{

    background:#0d9f4f;
    color:white;
    border:none;
    border-radius:14px;
    height:50px;
    padding:0 24px;
    cursor:pointer;
    font-weight:700;
    margin-top:18px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
}

#modal{

    position:fixed;
    inset:0;
    background:rgba(0,0,0,.65);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.modal-layout{

    width:min(1150px,96vw);
    height:min(92vh,850px);
    background:white;
    border-radius:28px;
    display:grid;
    grid-template-columns:1fr 1fr;
    overflow:hidden;
}

.modal-left,
.modal-right{
    padding:34px;
}

.modal-right{
    overflow:hidden;
}

.modal-image-box{

    position:relative;
    height:520px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.main-modal-image{

    max-width:100%;
    max-height:500px;
    object-fit:contain;
}

.img-arrow{

    position:absolute;
    top:50%;
    transform:translateY(-50%);
    border:none;
    background:black;
    color:white;
    width:42px;
    height:42px;
    border-radius:50%;
    cursor:pointer;
}

.left{ left:0; }
.right{ right:0; }

.thumbs{
    display:flex;
    gap:10px;
    margin-top:14px;
}

.thumb{

    width:70px;
    height:70px;
    border-radius:12px;
    object-fit:contain;
    border:1px solid #ddd;
    cursor:pointer;
}

.variant-wrap{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:18px;
}

.variant-btn{

    border:1px solid #ccc;
    background:white;
    padding:10px 14px;
    border-radius:12px;
    cursor:pointer;
}

.disabled-variant{

    text-decoration:line-through;
    opacity:.45;
}

.bullets{

    margin-top:14px;
    padding-left:20px;
    line-height:1.7;
}

.slider-row{

    position:relative;
    margin:25px;
}

.slider{

    display:flex;
    overflow-x:auto;
    gap:12px;
    scroll-behavior:smooth;
    padding-bottom:8px;
}

.filter-chip{

    white-space:nowrap;
    border:none;
    background:black;
    color:white;
    padding:12px 18px;
    border-radius:999px;
    cursor:pointer;
}

.whatsapp-float{

    position:fixed;
    right:22px;
    bottom:22px;
    z-index:999;
    background:#0d9f4f;
    color:white;
    width:65px;
    height:65px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    text-decoration:none;
    box-shadow:0 6px 20px rgba(0,0,0,.2);
}

@media(max-width:900px){

    .modal-layout{
        grid-template-columns:1fr;
        height:95vh;
        overflow:auto;
    }

    .modal-image-box{
        height:300px;
    }

    .main-modal-image{
        max-height:280px;
    }

    .products-grid{
        grid-template-columns:repeat(2,1fr);
        gap:14px;
        padding:14px;
    }

    .product-title{
        font-size:17px;
        min-height:auto;
    }

    .product-price{
        font-size:22px;
    }
}

</style>
