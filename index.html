<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AL HAYAT TRADING COMPANY | Imported Supplements India</title>

<meta name="description"
content="Buy 100% authentic imported supplements including whey protein, creatine, pre workout, amino acids and more.">

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eaeded;
overflow-x:hidden;
}

/* =========================
HEADER
========================= */

.topbar{
background:#131921;
padding:12px 25px;
display:flex;
align-items:center;
justify-content:space-between;
gap:20px;
position:sticky;
top:0;
z-index:999;
flex-wrap:wrap;
}

.logo-area{
display:flex;
align-items:center;
gap:15px;
}

.logo-area img{
width:65px;
height:65px;
border-radius:10px;
background:white;
object-fit:cover;
}

.logo-area h1{
font-size:32px;
color:white;
font-weight:800;
}

.search-box{
flex:1;
min-width:250px;
max-width:700px;
}

.search-box input{
width:100%;
padding:15px;
border:none;
border-radius:8px;
font-size:17px;
outline:none;
}

.contact{
color:white;
font-size:18px;
font-weight:bold;
}

/* =========================
HERO
========================= */

.hero{
height:500px;
background:
linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438?q=80&w=1400&auto=format&fit=crop');

background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

.hero-content h2{
font-size:58px;
color:white;
margin-bottom:15px;
font-weight:900;
}

.hero-content p{
font-size:24px;
color:white;
}

/* =========================
SECTION
========================= */

.section-title{
font-size:38px;
font-weight:800;
padding:35px 25px 10px;
color:#111;
}

/* =========================
PRODUCT GRID
========================= */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(330px,1fr));
gap:25px;
padding:25px;
max-width:1700px;
margin:auto;
}

/* =========================
CARD
========================= */

.card{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,0.12);
transition:0.3s;
cursor:pointer;
position:relative;
}

.card:hover{
transform:translateY(-5px);
}

.image-wrapper{
background:white;
height:340px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.product-img{
width:100%;
height:100%;
object-fit:contain;
transition:0.4s;
}

.card:hover .product-img{
transform:scale(1.05);
}

.card-content{
padding:18px;
}

.brand{
font-size:14px;
color:#007185;
margin-bottom:8px;
}

.product-title{
font-size:21px;
font-weight:700;
line-height:1.45;
margin-bottom:12px;
min-height:95px;
color:#111;
}

.rating{
font-size:17px;
margin-bottom:10px;
color:#ff9900;
}

.price{
font-size:34px;
font-weight:800;
margin-bottom:10px;
color:#111;
}

.stock{
font-size:16px;
font-weight:bold;
margin-bottom:15px;
}

.instock{
color:green;
}

.outstock{
color:red;
}

.flavor-title{
font-size:15px;
font-weight:bold;
margin-bottom:8px;
}

.flavor-select{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
margin-bottom:15px;
}

.bullets{
margin-bottom:18px;
padding-left:18px;
}

.bullets li{
margin-bottom:8px;
font-size:15px;
line-height:1.5;
}

.order-btn{
width:100%;
padding:16px;
background:#25D366;
border:none;
color:white;
font-size:18px;
font-weight:bold;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.order-btn:hover{
background:#1fb959;
}

/* =========================
MODAL
========================= */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
padding:20px;
}

.modal-content{
background:white;
width:100%;
max-width:1200px;
border-radius:18px;
overflow:hidden;
display:grid;
grid-template-columns:1fr 1fr;
max-height:95vh;
overflow-y:auto;
}

.modal-left{
padding:25px;
background:#fff;
}

.main-image{
width:100%;
height:500px;
object-fit:contain;
margin-bottom:20px;
}

.thumbnail-row{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.thumbnail{
width:90px;
height:90px;
border:2px solid #ddd;
border-radius:10px;
object-fit:contain;
cursor:pointer;
background:white;
padding:5px;
}

.modal-right{
padding:30px;
}

.modal-title{
font-size:34px;
font-weight:800;
margin-bottom:15px;
line-height:1.4;
}

.modal-price{
font-size:40px;
font-weight:900;
margin-bottom:15px;
}

.close-btn{
position:absolute;
top:20px;
right:25px;
font-size:40px;
color:white;
cursor:pointer;
}

/* =========================
WHATSAPP FLOAT
========================= */

.float-whatsapp{
position:fixed;
bottom:20px;
right:20px;
width:70px;
height:70px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
text-decoration:none;
color:white;
z-index:999;
box-shadow:0 5px 12px rgba(0,0,0,0.3);
}

/* =========================
FOOTER
========================= */

footer{
background:#131921;
color:white;
text-align:center;
padding:35px;
margin-top:50px;
font-size:16px;
}

/* =========================
MOBILE
========================= */

@media(max-width:900px){

.modal-content{
grid-template-columns:1fr;
}

.hero{
height:350px;
}

.hero-content h2{
font-size:38px;
}

.hero-content p{
font-size:18px;
}

.logo-area h1{
font-size:20px;
}

.main-image{
height:350px;
}

}

</style>

</head>

<body>

<!-- =========================
HEADER
========================= -->

<div class="topbar">

<div class="logo-area">

<img src="https://i.postimg.cc/ncHVXSW3/LOGO.jpg">

<h1>AL HAYAT TRADING COMPANY</h1>

</div>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search Supplements..."
onkeyup="searchProducts()">

</div>

<div class="contact">

📞 +91 77100 77786

</div>

</div>

<!-- =========================
HERO
========================= -->

<section class="hero">

<div class="hero-content">

<h2>100% Authentic Imported Supplements</h2>

<p>
Whey Protein • Pre Workout • Creatine • BCAA
</p>

</div>

</section>

<!-- =========================
SECTION
========================= -->

<h2 class="section-title">
Best Sellers
</h2>

<!-- =========================
PRODUCTS
========================= -->

<div class="products" id="products-container">
</div>

<!-- =========================
MODAL
========================= -->

<div class="modal" id="productModal">

<div class="close-btn"
onclick="closeModal()">
×
</div>

<div class="modal-content">

<div class="modal-left">

<img
id="modalMainImage"
class="main-image"
src="">

<div
class="thumbnail-row"
id="thumbnailRow">
</div>

</div>

<div class="modal-right">

<div class="brand">
Visit The Store
</div>

<h2
class="modal-title"
id="modalTitle">
</h2>

<div class="rating">
⭐⭐⭐⭐☆ 4.5
</div>

<div
class="modal-price"
id="modalPrice">
</div>

<div
id="modalStock"
class="stock instock">
</div>

<h3 style="margin-bottom:10px;">
Flavor
</h3>

<select
id="modalFlavor"
class="flavor-select">
</select>

class="bullets"
id="modalBullets">
</ul>

<button
class="order-btn"
onclick="modalOrder()">

Order on WhatsApp

</div>

</div>

</div>

<!-- =========================
FOOTER
========================= -->

<footer>

© 2026 AL HAYAT TRADING COMPANY — All Rights Reserved

WHATSAPP
========================= -->

<a
class="float-whatsapp"
href="https://wa.me/917710077786"
target="_blank">

💬

</a>

<script>

const WHATSAPP_NUMBER = "917710077786";

const SHEET_CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQZimj_keJIooGDnz0sOvML4cjwbQ8eZBnQ3CQ1xyiORgHssrZPaCYzqdbFz-EmKmFrAqBgV6C3kLUK/pub?output=csv";

let allProducts = [];

async function loadProducts(){

const container =
document.getElementById("products-container");

container.innerHTML = "";

try{

const response =
await fetch(SHEET_CSV_URL);

const csv =
await response.text();

const rows =
csv.trim().split("\n").slice(1);

rows.forEach((row,index)=>{

const cols =
row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

if(!cols || cols.length < 4) return;

const sku =
cols[0].replace(/"/g,"").trim();

const title =
cols[1].replace(/"/g,"").trim();

const price =
cols[2].replace(/"/g,"").trim();

const stock =
cols[3].replace(/"/g,"").trim();

const image1 =
`https://source.unsplash.com/800x800/?${encodeURIComponent(title)},protein`;

const image2 =
`https://source.unsplash.com/801x801/?${encodeURIComponent(title)},supplement`;

const image3 =
`https://source.unsplash.com/802x802/?${encodeURIComponent(title)},gym`;

let bullets = [
"Premium Imported Supplement Formula",
"Supports Muscle Recovery & Performance",
"High Quality International Product",
"Popular Choice Among Fitness Enthusiasts"
];

if(title.toLowerCase().includes("whey")){

bullets = [
"High Quality Whey Protein Formula",
"Supports Lean Muscle Growth",
"Fast Absorbing Protein Source",
"Ideal Post Workout Recovery"
];

}

if(title.toLowerCase().includes("pre")){

bullets = [
"Supports Energy & Workout Performance",
"Helps Improve Focus & Pumps",
"Popular Pre Workout Formula",
"Ideal Before Intense Training"
];

}

if(title.toLowerCase().includes("bcaa")){

bullets = [
"Supports Muscle Recovery",
"Helps Reduce Muscle Breakdown",
"Hydration & Endurance Support",
"Ideal During Workouts"
];

}

const flavors = [

"Chocolate",
"Vanilla",
"Cookies & Cream",
"Blue Raspberry",
"Strawberry",
"Unflavoured"

];

const product = {

sku,
title,
price,
stock,
images:[
image1,
image2,
image3
],
bullets,
flavors

};

allProducts.push(product);

container.innerHTML += `

<div
class="card searchable"
onclick="openModal(${index})">

<div class="image-wrapper">

<img
class="product-img"
src="${image1}"
loading="lazy">

</div>

<div class="card-content">

<div class="brand">
Visit The Store
</div>

<div class="product-title">
${title}
</div>

<div class="rating">
⭐⭐⭐⭐☆ 4.5
</div>

<div class="price">
₹${price}
</div>

<div class="stock ${stock.toLowerCase().includes('out') ? 'outstock' : 'instock'}">
${stock}
</div>

<div class="flavor-title">
Available Flavors
</div>

<select class="flavor-select">

${flavors.map(flavor=>
`<option>${flavor}</option>`
).join("")}

</select>

<ul class="bullets">

${bullets.map(bullet=>
`<li>${bullet}</li>`
).join("")}

</ul>

<button
class="order-btn">

View Product

</button>

</div>

</div>

`;

});

}catch(error){

console.log(error);

container.innerHTML =
"<h2 style='padding:40px'>Unable To Load Products</h2>";

}

}

function openModal(index){

const product =
allProducts[index];

document.getElementById("productModal")
.style.display = "flex";

document.getElementById("modalMainImage")
.src = product.images[0];

document.getElementById("modalTitle")
.innerText = product.title;

document.getElementById("modalPrice")
.innerText = `₹${product.price}`;

document.getElementById("modalStock")
.innerText = product.stock;

document.getElementById("modalBullets")
.innerHTML =
product.bullets.map(bullet=>
`<li>${bullet}</li>`
).join("");

document.getElementById("modalFlavor")
.innerHTML =
product.flavors.map(flavor=>
`<option>${flavor}</option>`
).join("");

document.getElementById("thumbnailRow")
.innerHTML =
product.images.map(image=>

`<img
class="thumbnail"
src="${image}"
onclick="changeMainImage('${image}')">`

).join("");

window.selectedProduct =
product;

}

function changeMainImage(image){

document.getElementById("modalMainImage")
.src = image;

}

function closeModal(){

document.getElementById("productModal")
.style.display = "none";

}

function modalOrder(){

const flavor =
document.getElementById("modalFlavor")
.value;

const message = `Hello,

I want to order:

Product:
${window.selectedProduct.title}

Flavor:
${flavor}

Price:
₹${window.selectedProduct.price}

Please share payment details.`;

window.open(
`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`,
"_blank"
);

}

function searchProducts(){

const input =
document.getElementById("searchInput")
.value
.toLowerCase();

const cards =
document.querySelectorAll(".searchable");

cards.forEach(card=>{

const title =
card.querySelector(".product-title")
.innerText
.toLowerCase();

if(title.includes(input)){

card.style.display = "block";

}else{

card.style.display = "none";

}

});

}

window.onclick = function(event){

const modal =
document.getElementById("productModal");

if(event.target == modal){

closeModal();

}

}

loadProducts();

</script>

</body>

</html>
