<script>

const WHATSAPP_NUMBER =
"917710077786";

const SHEET_CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQZimj_keJIooGDnz0sOvML4cjwbQ8eZBnQ3CQ1xyiORgHssrZPaCYzqdbFz-EmKmFrAqBgV6C3kLUK/pub?output=csv";

let allProducts = [];
let groupedProducts = [];
let filteredProducts = [];

/* =========================
AUTO BULLETS
========================= */

function generateBullets(title,category){

title = title.toLowerCase();
category = category.toLowerCase();

if(category.includes("hydrolyzed")){

return [
"Fast Digesting Hydrolyzed Protein",
"Supports Lean Muscle Recovery",
"Low Carb & Low Fat Formula",
"Premium Whey Protein Source"
];

}

if(category.includes("isolate")){

return [
"High Protein Isolate Formula",
"Supports Lean Muscle Growth",
"Low Sugar & Low Fat",
"Fast Absorption Protein Blend"
];

}

if(title.includes("creatine")){

return [
"Supports Strength & Power Output",
"Micronized Creatine Formula",
"Improves Workout Performance",
"Ideal For Daily Training"
];

}

return [
"Premium Imported Supplement Formula",
"Supports Fitness Goals",
"Trusted International Brand",
"High Quality Sports Nutrition Product"
];

}

/* =========================
LOAD PRODUCTS
========================= */

async function loadProducts(){

const response =
await fetch(SHEET_CSV_URL);

const csv =
await response.text();

const rows =
csv.trim().split("\n").slice(1);

allProducts = [];

rows.forEach(row=>{

const cols =
row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

if(!cols || cols.length < 12) return;

const product = {

sku: cols[0].replace(/"/g,"").trim(),
brand: cols[1].replace(/"/g,"").trim(),
mainCategory: cols[2].replace(/"/g,"").trim(),
category: cols[3].replace(/"/g,"").trim(),
item: cols[4].replace(/"/g,"").trim(),
flavour: cols[5].replace(/"/g,"").trim(),
size: cols[6].replace(/"/g,"").trim(),
price: cols[7].replace(/"/g,"").trim(),
stock: cols[8].replace(/"/g,"").trim(),
image1: cols[9].replace(/"/g,"").trim(),
image2: cols[10].replace(/"/g,"").trim(),
image3: cols[11].replace(/"/g,"").trim()

};

product.bullets =
generateBullets(product.item,product.category);

allProducts.push(product);

});

filteredProducts = [...allProducts];

renderSidebar();
renderProducts();

}

/* =========================
SIDEBAR
========================= */

function renderSidebar(){

const brands =
[...new Set(allProducts.map(p=>p.brand))];

document.getElementById("brandLinks")
.innerHTML =

brands.map(brand=>

`<div
class="sidebar-link"
onclick="filterBrand('${brand}')">

${brand}

</div>`

).join("");

const categories =
[...new Set(allProducts.map(p=>p.mainCategory))];

document.getElementById("categoryLinks")
.innerHTML =

categories.map(category=>

`<div
class="sidebar-link"
onclick="filterCategory('${category}')">

${category}

</div>`

).join("");

}

/* =========================
FILTERS
========================= */

function filterBrand(brand){

filteredProducts =
allProducts.filter(p=>p.brand===brand);

renderProducts();
closeSidebar();

}

function filterCategory(category){

filteredProducts =
allProducts.filter(p=>p.mainCategory===category);

renderProducts();
closeSidebar();

}

function showAllProducts(){

filteredProducts =
[...allProducts];

renderProducts();
closeSidebar();

}

/* =========================
RENDER PRODUCTS
========================= */

function renderProducts(){

const container =
document.getElementById("products-container");

container.innerHTML = "";

const grouped = {};

filteredProducts.forEach(product=>{

const key =
product.item;

if(!grouped[key]){

grouped[key] = [];

}

grouped[key].push(product);

});

groupedProducts =
Object.values(grouped);

groupedProducts.forEach((group,index)=>{

const first =
group[0];

container.innerHTML += `

<div
class="card searchable"
onclick="openModal(${index})">

<div class="image-wrapper">

<img
class="product-img"
src="${first.image1}">

</div>

<div class="card-content">

<div class="product-title">

${first.item}

</div>

<div class="meta">

Flavor: ${first.flavour}

</div>

<div class="meta">

Size: ${first.size}

</div>

<div class="price">

₹${first.price}

</div>

<div class="stock ${first.stock.toLowerCase().includes('out') ? 'outstock' : 'instock'}">

${first.stock}

</div>

<ul class="bullets">

${first.bullets.map(bullet=>
`<li>${bullet}</li>`
).join("")}

</ul>

<button
class="order-btn"
style="
${first.stock.toLowerCase().includes('out')
?
'background:#999;cursor:not-allowed;'
:
''}
">

${first.stock.toLowerCase().includes('out')
?
'Out Of Stock'
:
'View Product'}

</button>

</div>

</div>

`;

});

}

/* =========================
SEARCH
========================= */

function liveSearch(){

const input =
document.getElementById("searchInput")
.value.toLowerCase();

const suggestions =
document.getElementById("searchSuggestions");

if(input.length===0){

suggestions.style.display =
"none";

return;

}

const matches =
allProducts.filter(product=>

product.item.toLowerCase().includes(input)

).slice(0,8);

suggestions.innerHTML =

matches.map(product=>

`<div
class="suggestion"
onclick="selectSuggestion('${product.item}')">

${product.item}

</div>`

).join("");

suggestions.style.display =
"block";

}

function selectSuggestion(name){

document.getElementById("searchInput")
.value = name;

performSearch();

}

function performSearch(){

const input =
document.getElementById("searchInput")
.value.toLowerCase();

filteredProducts =
allProducts.filter(product=>

product.item.toLowerCase().includes(input)

);

renderProducts();

document.getElementById("searchSuggestions")
.style.display = "none";

}

/* =========================
MODAL
========================= */

function openModal(index){

const group =
groupedProducts[index];

window.currentGroup =
group;

window.selectedVariant =
group[0];

document.getElementById("productModal")
.style.display = "flex";

updateModal(group[0]);

const dropdown =
document.getElementById("modalFlavorDropdown");

dropdown.innerHTML =

group.map((variant,index)=>

`<option value="${index}">
${variant.flavour}
</option>`

).join("");

dropdown.onchange = function(){

const selected =
group[this.value];

window.selectedVariant =
selected;

updateModal(selected);

};

}

function updateModal(product){

document.getElementById("mainModalImage")
.src = product.image1;

document.getElementById("modalTitle")
.innerText = product.item;

document.getElementById("modalPrice")
.innerText = `₹${product.price}`;

document.getElementById("modalStock")
.innerText = product.stock;

document.getElementById("modalStock")
.className =
`stock ${product.stock.toLowerCase().includes('out') ? 'outstock' : 'instock'}`;

document.getElementById("modalSize")
.innerText =
`Size: ${product.size}`;

document.getElementById("modalFlavor")
.innerText =
`Flavor: ${product.flavour}`;

document.getElementById("modalBullets")
.innerHTML =

product.bullets.map(bullet=>
`<li>${bullet}</li>`
).join("");

document.getElementById("thumbRow")
.innerHTML =

`

<img
class="thumb"
src="${product.image1}"
onclick="changeImage('${product.image1}')">

<img
class="thumb"
src="${product.image2}"
onclick="changeImage('${product.image2}')">

<img
class="thumb"
src="${product.image3}"
onclick="changeImage('${product.image3}')">

`;

const btn =
document.getElementById("modalOrderBtn");

if(product.stock.toLowerCase().includes("out")){

btn.disabled = true;
btn.innerText = "Out Of Stock";
btn.style.background = "#999";
btn.style.cursor = "not-allowed";

}else{

btn.disabled = false;
btn.innerText = "Order on WhatsApp";
btn.style.background = "#25D366";
btn.style.cursor = "pointer";

}

}

function changeImage(image){

document.getElementById("mainModalImage")
.src = image;

}

function closeModal(){

document.getElementById("productModal")
.style.display = "none";

}

/* =========================
WHATSAPP
========================= */

function orderNow(){

const product =
window.selectedVariant;

if(product.stock.toLowerCase().includes("out")) return;

const message = `Hello,

I want to order:

${product.item}

Flavor:
${product.flavour}

Size:
${product.size}

Price:
₹${product.price}

Please share payment details.`;

window.open(

`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`,

"_blank"

);

}

/* =========================
SIDEBAR
========================= */

function openSidebar(){

document.getElementById("sidebar")
.classList.add("active");

}

function closeSidebar(){

document.getElementById("sidebar")
.classList.remove("active");

}

window.onclick = function(event){

const modal =
document.getElementById("productModal");

if(event.target == modal){

closeModal();

}

}

/* =========================
START
========================= */

loadProducts();

</script>
