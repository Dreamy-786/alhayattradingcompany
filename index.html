<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AL HAYAT TRADING COMPANY</title>

<link rel="icon" href="https://i.postimg.cc/ncHVXSW3/LOGO.jpg">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#f4f1ea;
font-family:'Inter',sans-serif;
color:#111;
overflow-x:hidden;
}

/* HEADER */

header{
position:sticky;
top:0;
z-index:99999;
background:rgba(255,255,255,.92);
backdrop-filter:blur(14px);
border-bottom:1px solid rgba(0,0,0,.06);
padding:14px 40px;
display:flex;
align-items:center;
justify-content:space-between;
gap:30px;
}

.logo{
display:flex;
align-items:center;
gap:16px;
text-decoration:none;
}

.logo img{
width:64px;
height:64px;
border-radius:16px;
object-fit:cover;
box-shadow:0 6px 18px rgba(0,0,0,.15);
background:white;
}

.logo-text{
display:flex;
flex-direction:column;
}

.logo-text h1{
font-family:'Cinzel',serif;
font-size:24px;
font-weight:800;
letter-spacing:2px;
color:#111;
line-height:1;
}

.logo-text span{
font-size:12px;
letter-spacing:4px;
color:#777;
margin-top:6px;
}

/* HERO */

.hero{
height:480px;
position:relative;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:30px;
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438?q=80&w=2000&auto=format&fit=crop');

background-size:cover;
background-position:center;
}

.hero::after{
content:'';
position:absolute;
inset:0;
background:
linear-gradient(to bottom,transparent,rgba(0,0,0,.35));
}

.hero-content{
position:relative;
z-index:2;
max-width:1100px;
}

.hero-content h2{
font-family:'Cinzel',serif;
font-size:72px;
font-weight:800;
color:white;
line-height:1.15;
margin-bottom:18px;
letter-spacing:2px;
}

.hero-content p{
font-size:20px;
color:#f1f1f1;
font-weight:400;
letter-spacing:1px;
}

/* TOPBAR */

.topbar{
position:sticky;
top:95px;
z-index:9999;
background:white;
padding:18px 30px;
display:flex;
gap:18px;
align-items:center;
border-bottom:1px solid rgba(0,0,0,.06);
flex-wrap:wrap;
}

.filter{
padding:16px 18px;
border-radius:14px;
border:1px solid rgba(0,0,0,.1);
background:white;
font-size:15px;
font-weight:600;
min-width:230px;
outline:none;
font-family:'Inter',sans-serif;
}

.search-box{
flex:1;
display:flex;
align-items:center;
background:#f7f7f7;
border-radius:14px;
padding:0 18px;
height:58px;
border:1px solid rgba(0,0,0,.08);
min-width:250px;
}

.search-box input{
flex:1;
border:none;
background:none;
outline:none;
font-size:16px;
font-family:'Inter',sans-serif;
}

.search-box button{
background:none;
border:none;
font-size:22px;
cursor:pointer;
}

/* PRODUCTS */

#productsContainer{
padding:40px 30px 70px;
}

.section-title{
font-family:'Cinzel',serif;
font-size:42px;
margin-bottom:26px;
font-weight:700;
letter-spacing:1px;
}

.products-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
gap:28px;
}

.card{
background:white;
border-radius:26px;
overflow:hidden;
cursor:pointer;
transition:.25s;
box-shadow:
0 10px 35px rgba(0,0,0,.07);
border:1px solid rgba(0,0,0,.05);
display:flex;
flex-direction:column;
}

.card:hover{
transform:translateY(-6px);
}

.card-image{
height:300px;
background:#fff;
padding:24px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.card-image img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

.stock-badge{
position:absolute;
top:16px;
left:16px;
padding:8px 14px;
border-radius:100px;
font-size:12px;
font-weight:700;
letter-spacing:.5px;
}

.instock{
background:#e9f8ef;
color:#198754;
}

.outstock{
background:#fdecec;
color:#dc3545;
}

.card-content{
padding:24px;
display:flex;
flex-direction:column;
flex:1;
}

.brand{
font-size:12px;
font-weight:700;
letter-spacing:2px;
color:#777;
margin-bottom:12px;
text-transform:uppercase;
}

.title{
font-family:'Cinzel',serif;
font-size:23px;
line-height:1.4;
min-height:120px;
margin-bottom:18px;
}

.price{
font-size:34px;
font-weight:800;
margin-bottom:14px;
}

.meta{
font-size:14px;
margin-bottom:8px;
color:#555;
}

.view-btn{
margin-top:auto;
height:54px;
border:none;
border-radius:14px;
background:#111;
color:white;
font-size:15px;
font-weight:700;
cursor:pointer;
transition:.2s;
}

.view-btn:hover{
background:#222;
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center;
padding:25px;
z-index:999999;
}

.modal-box{
width:100%;
max-width:1320px;
height:92vh;
background:white;
border-radius:32px;
overflow:hidden;
display:grid;
grid-template-columns:1fr 1fr;
position:relative;
}

.close{
position:absolute;
top:18px;
right:22px;
font-size:42px;
cursor:pointer;
z-index:99;
}

.modal-left{
padding:45px;
background:#fafafa;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
}

.main-image{
width:100%;
height:520px;
object-fit:contain;
transition:.2s;
}

.image-nav{
position:absolute;
top:50%;
transform:translateY(-50%);
width:54px;
height:54px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
box-shadow:0 8px 24px rgba(0,0,0,.12);
user-select:none;
}

.prev-btn{
left:20px;
}

.next-btn{
right:20px;
}

.thumbs{
display:flex;
gap:14px;
margin-top:24px;
flex-wrap:wrap;
justify-content:center;
}

.thumb{
width:92px;
height:92px;
border-radius:16px;
border:2px solid #ddd;
padding:8px;
cursor:pointer;
object-fit:contain;
background:white;
}

.modal-right{
padding:50px;
overflow-y:auto;
}

.modal-title{
font-family:'Cinzel',serif;
font-size:42px;
line-height:1.4;
margin-bottom:18px;
}

.modal-price{
font-size:48px;
font-weight:800;
margin-bottom:18px;
}

.servings{
display:inline-block;
padding:10px 18px;
background:#111;
color:white;
border-radius:100px;
font-size:14px;
font-weight:700;
margin-bottom:22px;
}

.detail{
font-size:16px;
margin-bottom:12px;
color:#444;
}

.option-title{
font-size:17px;
font-weight:700;
margin-top:28px;
margin-bottom:14px;
}

.options{
display:flex;
flex-wrap:wrap;
gap:12px;
}

.option{
padding:12px 16px;
border-radius:12px;
border:1px solid #ccc;
font-size:14px;
cursor:pointer;
background:white;
transition:.2s;
}

.option.active{
background:#111;
color:white;
border-color:#111;
}

.option.disabled{
opacity:.4;
text-decoration:line-through;
cursor:not-allowed;
}

.features{
margin-top:30px;
padding-left:20px;
}

.features li{
margin-bottom:14px;
line-height:1.7;
font-size:15px;
color:#444;
}

.order-btn{
margin-top:35px;
width:100%;
height:62px;
border:none;
border-radius:16px;
background:#111;
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
}

/* MOBILE */

@media(max-width:950px){

.hero{
height:380px;
}

.hero-content h2{
font-size:42px;
}

.topbar{
top:82px;
padding:15px;
}

.modal-box{
grid-template-columns:1fr;
height:95vh;
overflow-y:auto;
}

.modal-left,
.modal-right{
padding:25px;
}

.main-image{
height:340px;
}

.modal-title{
font-size:30px;
}

.products-grid{
grid-template-columns:1fr 1fr;
}

}

@media(max-width:650px){

header{
padding:12px 16px;
}

.logo img{
width:54px;
height:54px;
}

.logo-text h1{
font-size:18px;
}

.hero-content h2{
font-size:34px;
}

.hero-content p{
font-size:15px;
}

.products-grid{
grid-template-columns:1fr;
}

.section-title{
font-size:28px;
}

.title{
font-size:18px;
min-height:auto;
}

.price{
font-size:26px;
}

.modal-title{
font-size:25px;
}

.modal-price{
font-size:34px;
}

}

</style>

</head>

<body>

<header>

<a class="logo" href="#">

<img src="https://i.postimg.cc/ncHVXSW3/LOGO.jpg">

<div class="logo-text">
<h1>AL HAYAT</h1>
<span>TRADING COMPANY</span>
</div>

</a>

</header>

<section class="hero">

<div class="hero-content">

<h2>Imported Sports Nutrition</h2>

<p>
Authentic supplements sourced from trusted international brands
</p>

</div>

</section>

<div class="topbar">

<select id="viewFilter" class="filter">

<option value="all">Assorted Products</option>
<option value="brand">Shop By Brand</option>
<option value="category">Shop By Category</option>

</select>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search products, brands, flavours...">

<button>
🔍
</button>

</div>

</div>

<div id="productsContainer"></div>

<div class="modal" id="modal">

<div class="modal-box">

<div class="close" onclick="closeModal()">
×
</div>

<div class="modal-left">

<div class="image-nav prev-btn" onclick="prevImage()">
‹
</div>

<img id="mainImage" class="main-image">

<div class="image-nav next-btn" onclick="nextImage()">
›
</div>

<div class="thumbs" id="thumbs"></div>

</div>

<div class="modal-right">

<div id="modalTitle" class="modal-title"></div>

<div id="modalPrice" class="modal-price"></div>

<div id="servings" class="servings"></div>

<div id="stock" class="detail"></div>

<div id="size" class="detail"></div>

<div id="flavour" class="detail"></div>

<div class="option-title">
Flavours
</div>

<div id="flavourOptions" class="options"></div>

<div class="option-title">
Sizes
</div>

<div id="sizeOptions" class="options"></div>

<ul id="features" class="features"></ul>

<button id="orderBtn" class="order-btn">
Order On WhatsApp
</button>

</div>

</div>

</div>

<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQZimj_keJIooGDnz0sOvML4cjwbQ8eZBnQ3CQ1xyiORgHssrZPaCYzqdbFz-EmKmFrAqBgV6C3kLUK/pub?output=csv";

let allProducts = [];
let currentImages = [];
let currentImageIndex = 0;

async function loadProducts(){

const res = await fetch(CSV_URL);
const text = await res.text();

const rows = text.trim().split("\n");
const headers = rows[0].split(",");

allProducts = rows.slice(1).map(row=>{

const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g) || [];

return{

sku: cols[0]?.replace(/"/g,'').trim() || "",
brand: cols[1]?.replace(/"/g,'').trim() || "",
item: cols[2]?.replace(/"/g,'').trim() || "",
price: cols[3]?.replace(/"/g,'').trim() || "",
stock: cols[4]?.replace(/"/g,'').trim() || "",
category: cols[5]?.replace(/"/g,'').trim() || "",
size: cols[6]?.replace(/"/g,'').trim() || "",
flavour: cols[7]?.replace(/"/g,'').trim() || "",
image1: cols[8]?.replace(/"/g,'').trim() || "",
image2: cols[9]?.replace(/"/g,'').trim() || "",
image3: cols[10]?.replace(/"/g,'').trim() || "",
bullet1: cols[11]?.replace(/"/g,'').trim() || "",
bullet2: cols[12]?.replace(/"/g,'').trim() || "",
bullet3: cols[13]?.replace(/"/g,'').trim() || "",
bullet4: cols[14]?.replace(/"/g,'').trim() || "",
servings: cols[15]?.replace(/"/g,'').trim() || ""

};

});

renderProducts();

}

function renderProducts(){

const container =
document.getElementById("productsContainer");

const mode =
document.getElementById("viewFilter").value;

const search =
document.getElementById("searchInput")
.value
.toLowerCase();

container.innerHTML = "";

let filtered =
allProducts.filter(p=>

(p.item + p.brand + p.flavour + p.category)
.toLowerCase()
.includes(search)

);

if(mode === "all"){

renderSection("All Products",filtered);

}

if(mode === "brand"){

const brands = {};

filtered.forEach(p=>{

if(!brands[p.brand]) brands[p.brand] = [];

brands[p.brand].push(p);

});

Object.keys(brands).forEach(b=>{

renderSection(b,brands[b]);

});

}

if(mode === "category"){

const cats = {};

filtered.forEach(p=>{

if(!cats[p.category]) cats[p.category] = [];

cats[p.category].push(p);

});

Object.keys(cats).forEach(c=>{

renderSection(c,cats[c]);

});

}

}

function renderSection(title,data){

const container =
document.getElementById("productsContainer");

const unique = {};

data.forEach(p=>{

const key =
p.item;

if(!unique[key]){

unique[key] = p;

}

});

const products =
Object.values(unique);

const section =
document.createElement("div");

section.innerHTML = `

<div class="section-title">
${title}
</div>

<div class="products-grid">

${products.map(product=>`

<div class="card"
onclick="openModal('${product.item.replace(/'/g,"")}')">

<div class="card-image">

<div class="stock-badge ${product.stock.toLowerCase().includes('out') ? 'outstock' : 'instock'}">
${product.stock}
</div>

<img src="${product.image1 || 'https://via.placeholder.com/300'}">

</div>

<div class="card-content">

<div class="brand">
${product.brand}
</div>

<div class="title">
${product.item}
</div>

<div class="price">
₹${product.price || "-"}
</div>

<div class="meta">
${product.size || ""}
</div>

<button class="view-btn">
View Product
</button>

</div>

</div>

`).join("")}

</div>

`;

container.appendChild(section);

}

let currentGroup = [];
let selectedProduct = null;

function openModal(item){

currentGroup =
allProducts.filter(p=>p.item === item);

selectedProduct =
currentGroup[0];

updateModal(selectedProduct);

document.getElementById("modal").style.display =
"flex";

}

function updateModal(product){

selectedProduct = product;

document.getElementById("modalTitle").innerText =
product.item;

document.getElementById("modalPrice").innerText =
product.price ? `₹${product.price}` : "Price Unavailable";

document.getElementById("stock").innerHTML =
`<b>Status:</b> ${product.stock}`;

document.getElementById("size").innerHTML =
`<b>Size:</b> ${product.size || "-"}`;

document.getElementById("flavour").innerHTML =
`<b>Flavor:</b> ${product.flavour || "-"}`;

document.getElementById("servings").innerText =
product.servings ? `${product.servings} SERVINGS` : "—";

const imgs = [
product.image1,
product.image2,
product.image3
].filter(Boolean);

currentImages = imgs;
currentImageIndex = 0;

document.getElementById("mainImage").src =
imgs[0] || "";

document.getElementById("thumbs").innerHTML =

imgs.map((img,index)=>`

<img
class="thumb"
src="${img}"
onclick="setImage(${index})">

`).join("");

document.getElementById("features").innerHTML =

[
product.bullet1,
product.bullet2,
product.bullet3,
product.bullet4
]

.filter(Boolean)

.map(b=>`<li>${b}</li>`)

.join("");

/* UNIQUE FLAVOURS */

const flavourMap = {};

currentGroup.forEach(p=>{

if(!flavourMap[p.flavour]){

flavourMap[p.flavour] = p;

}

});

document.getElementById("flavourOptions").innerHTML =

Object.values(flavourMap).map(p=>`

<div
class="option ${p.flavour === product.flavour ? 'active' : ''}"
onclick="selectFlavour('${p.flavour.replace(/'/g,"")}')">

${p.flavour || "-"}

</div>

`).join("");

/* SIZES */

const sizes =
currentGroup.filter(p=>p.flavour === product.flavour);

document.getElementById("sizeOptions").innerHTML =

sizes.map(p=>`

<div
class="option
${p.size === product.size ? 'active' : ''}
${p.stock.toLowerCase().includes('out') ? 'disabled' : ''}"

onclick="${p.stock.toLowerCase().includes('out') ? '' : `selectSize('${p.size.replace(/'/g,"")}')`}">

${p.size}

</div>

`).join("");

document.getElementById("orderBtn").onclick = function(){

window.open(

`https://wa.me/917710077786?text=${encodeURIComponent(
`Hello, I want to order:

${product.item}

Flavor: ${product.flavour}

Size: ${product.size}

Price: ₹${product.price}`
)}`

);

};

}

function selectFlavour(flavour){

const product =
currentGroup.find(p=>p.flavour === flavour);

if(product){

updateModal(product);

}

}

function selectSize(size){

const product =
currentGroup.find(p=>

p.flavour === selectedProduct.flavour
&&
p.size === size

);

if(product){

updateModal(product);

}

}

function setImage(index){

currentImageIndex = index;

document.getElementById("mainImage").src =
currentImages[index];

}

function prevImage(){

currentImageIndex--;

if(currentImageIndex < 0){

currentImageIndex =
currentImages.length - 1;

}

setImage(currentImageIndex);

}

function nextImage(){

currentImageIndex++;

if(currentImageIndex >= currentImages.length){

currentImageIndex = 0;

}

setImage(currentImageIndex);

}

document.addEventListener("keydown",e=>{

if(document.getElementById("modal").style.display === "flex"){

if(e.key === "ArrowRight") nextImage();

if(e.key === "ArrowLeft") prevImage();

if(e.key === "Escape") closeModal();

}

});

function closeModal(){

document.getElementById("modal").style.display =
"none";

}

document.getElementById("viewFilter")
.addEventListener("change",renderProducts);

document.getElementById("searchInput")
.addEventListener("keyup",renderProducts);

window.onclick = function(e){

if(e.target.id === "modal"){

closeModal();

}

};

loadProducts();

</script>

</body>
</html>
