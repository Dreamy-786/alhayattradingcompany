<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AL HAYAT TRADING COMPANY</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f5f5;
color:#111;
overflow-x:hidden;
}

/* HEADER */

header{
background:#000;
padding:18px 30px;
display:flex;
align-items:center;
justify-content:space-between;
gap:20px;
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo img{
width:58px;
height:58px;
border-radius:12px;
object-fit:cover;
background:white;
}

.logo h1{
font-size:28px;
font-weight:900;
color:white;
letter-spacing:.5px;
}

.contact{
color:white;
font-weight:700;
font-size:15px;
}

/* HERO */

.hero{
height:350px;
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438?q=80&w=1600&auto=format&fit=crop');

background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;
text-align:center;

padding:20px;
}

.hero h2{
font-size:60px;
font-weight:900;
color:white;
margin-bottom:14px;
}

.hero p{
font-size:22px;
font-weight:600;
color:white;
}

/* TOP CONTROLS */

.top-controls{
position:sticky;
top:0;
z-index:999;
background:white;
padding:18px 25px;
display:flex;
gap:20px;
align-items:center;
justify-content:space-between;
flex-wrap:wrap;
box-shadow:0 2px 12px rgba(0,0,0,.08);
}

.filter-bar{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.filter-btn{
padding:14px 20px;
border:none;
border-radius:12px;
background:#eee;
font-size:14px;
font-weight:800;
cursor:pointer;
transition:.2s;
}

.filter-btn.active{
background:black;
color:white;
}

.search-wrapper{
flex:1;
max-width:700px;
}

.search-wrapper input{
width:100%;
padding:16px;
border:2px solid #ddd;
border-radius:12px;
outline:none;
font-size:15px;
font-weight:700;
}

/* CATEGORY */

.category-section{
padding:40px 30px;
}

.category-title{
font-size:38px;
font-weight:900;
margin-bottom:25px;
}

.products-row{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:22px;
}

/* CARD */

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 3px 12px rgba(0,0,0,.08);
transition:.2s;
cursor:pointer;
display:flex;
flex-direction:column;
height:100%;
}

.card:hover{
transform:translateY(-5px);
}

.product-image{
height:320px;
padding:20px;
display:flex;
align-items:center;
justify-content:center;
background:white;
}

.product-image img{
width:100%;
height:100%;
object-fit:contain;
}

.product-content{
padding:20px;
display:flex;
flex-direction:column;
height:100%;
}

.product-title{
font-size:18px;
font-weight:800;
line-height:1.5;
margin-bottom:12px;
min-height:85px;
}

.product-meta{
font-size:14px;
font-weight:700;
color:#666;
margin-bottom:6px;
}

.product-price{
font-size:32px;
font-weight:900;
margin:14px 0;
}

.stock{
font-size:15px;
font-weight:800;
margin-bottom:15px;
}

.instock{
color:green;
}

.outstock{
color:red;
}

.card-btn{
margin-top:auto;
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#25D366;
color:white;
font-size:16px;
font-weight:800;
cursor:pointer;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.78);
display:none;
align-items:center;
justify-content:center;
padding:20px;
z-index:999999;
}

.modal-box{
background:white;
width:100%;
max-width:1250px;
border-radius:24px;
overflow:hidden;
display:grid;
grid-template-columns:1fr 1fr;
position:relative;
max-height:95vh;
overflow-y:auto;
}

.close-modal{
position:absolute;
top:15px;
right:22px;
font-size:42px;
font-weight:900;
cursor:pointer;
z-index:999;
}

.modal-left{
padding:30px;
}

.main-image{
width:100%;
height:500px;
object-fit:contain;
cursor:zoom-in;
transition:.2s;
}

.main-image:hover{
transform:scale(1.03);
}

.thumbs{
display:flex;
gap:12px;
margin-top:18px;
flex-wrap:wrap;
}

.thumb{
width:90px;
height:90px;
padding:6px;
border:2px solid #ddd;
border-radius:10px;
cursor:pointer;
object-fit:contain;
background:white;
}

.modal-right{
padding:35px;
}

.modal-title{
font-size:36px;
font-weight:900;
line-height:1.4;
margin-bottom:15px;
}

.modal-price{
font-size:46px;
font-weight:900;
margin-bottom:15px;
}

.modal-detail{
font-size:16px;
font-weight:700;
margin-bottom:12px;
}

.servings-box{
display:inline-block;
background:#ff9900;
color:white;
padding:10px 18px;
border-radius:12px;
font-size:18px;
font-weight:900;
margin-bottom:20px;
}

.option-title{
font-size:15px;
font-weight:900;
margin-bottom:12px;
margin-top:20px;
}

.option-group{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.option-btn{
padding:12px 16px;
border:2px solid #ddd;
border-radius:10px;
background:white;
font-size:14px;
font-weight:800;
cursor:pointer;
transition:.2s;
}

.option-btn.active{
border-color:#ff9900;
background:#fff4df;
}

.option-btn.disabled{
opacity:.45;
text-decoration:line-through;
cursor:not-allowed;
}

.features{
margin:25px 0;
padding-left:18px;
}

.features li{
margin-bottom:12px;
font-size:15px;
font-weight:600;
line-height:1.5;
}

.order-btn{
width:100%;
padding:18px;
border:none;
border-radius:12px;
background:#25D366;
font-size:20px;
font-weight:900;
color:white;
cursor:pointer;
}

/* IMAGE POPUP */

.image-popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.96);
display:none;
align-items:center;
justify-content:center;
z-index:999999999;
padding:30px;
}

.image-popup img{
max-width:95%;
max-height:95%;
object-fit:contain;
}

.image-popup-close{
position:absolute;
top:20px;
right:35px;
font-size:52px;
font-weight:900;
color:white;
cursor:pointer;
}

/* FLOAT */

.float{
position:fixed;
right:18px;
bottom:18px;
width:72px;
height:72px;
border-radius:50%;
background:#25D366;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
text-decoration:none;
color:white;
z-index:999;
}

/* FOOTER */

footer{
background:black;
color:white;
text-align:center;
padding:35px;
margin-top:40px;
font-weight:700;
}

/* MOBILE */

@media(max-width:900px){

.hero{
height:260px;
}

.hero h2{
font-size:34px;
}

.hero p{
font-size:16px;
}

.logo h1{
font-size:18px;
}

.contact{
display:none;
}

.products-row{
grid-template-columns:1fr 1fr;
gap:14px;
}

.product-image{
height:220px;
}

.modal-box{
grid-template-columns:1fr;
}

.main-image{
height:320px;
}

.modal-title{
font-size:28px;
}

.modal-price{
font-size:34px;
}

}

@media(max-width:600px){

.products-row{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<header>

<div class="logo">

<img src="https://i.postimg.cc/ncHVXSW3/LOGO.jpg">

<h1>AL HAYAT TRADING</h1>

</div>

<div class="contact">
📞 +91 77100 77786
</div>

</header>

<section class="hero">

<div>

<h2>100% Authentic Imported Supplements</h2>

<p>
Whey Protein • Creatine • Pre Workout • Protein Snacks
</p>

</div>

</section>

<div class="top-controls">

<div class="filter-bar">

<button class="filter-btn active" onclick="setView('assorted', this)">
Assorted
</button>

<button class="filter-btn" onclick="setView('brand', this)">
Shop By Brand
</button>

<button class="filter-btn" onclick="setView('category', this)">
Shop By Category
</button>

</div>

<div class="search-wrapper">

<input
type="text"
placeholder="Search supplements..."
id="searchInput"
onkeyup="searchProducts()">

</div>

</div>

<div id="allCategories"></div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-box">

<div class="close-modal" onclick="closeModal()">
×
</div>

<div class="modal-left">

<img id="mainImage" class="main-image">

<div class="thumbs" id="thumbs"></div>

</div>

<div class="modal-right">

<div id="modalTitle" class="modal-title"></div>

<div id="modalPrice" class="modal-price"></div>

<div id="modalStock" class="stock"></div>

<div id="servingsBox" class="servings-box"></div>

<div id="modalBrand" class="modal-detail"></div>

<div id="modalCategory" class="modal-detail"></div>

<div class="option-title">
FLAVOURS
</div>

<div id="flavourOptions" class="option-group"></div>

<div class="option-title">
SIZES
</div>

<div id="sizeOptions" class="option-group"></div>

<ul id="modalFeatures" class="features"></ul>

<button id="orderBtn" class="order-btn">
Order On WhatsApp
</button>

</div>

</div>

</div>

<!-- IMAGE POPUP -->

<div class="image-popup" id="imagePopup">

<div
class="image-popup-close"
onclick="closeImagePopup()">

×

</div>

<img id="popupImage">

</div>

<footer>

© 2026 AL HAYAT TRADING COMPANY — ALL RIGHTS RESERVED

</footer>

<a
href="https://wa.me/917710077786"
class="float"
target="_blank">

💬

</a>

<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQZimj_keJIooGDnz0sOvML4cjwbQ8eZBnQ3CQ1xyiORgHssrZPaCYzqdbFz-EmKmFrAqBgV6C3kLUK/pub?output=csv";

const WHATSAPP =
"917710077786";

let allProducts = [];
let groupedProducts = [];
let currentView = "assorted";

function clean(text){

if(!text) return "";

return text.replace(/^"|"$/g,"").trim();

}

/* FAST CSV PARSER */

function parseCSV(text){

const rows = [];
let row = [];
let current = '';
let insideQuotes = false;

for(let i=0;i<text.length;i++){

const char = text[i];
const next = text[i+1];

if(char === '"'){

if(insideQuotes && next === '"'){
current += '"';
i++;
}else{
insideQuotes = !insideQuotes;
}

}else if(char === ',' && !insideQuotes){

row.push(current);
current='';

}else if((char === '\n' || char === '\r') && !insideQuotes){

if(current || row.length){
row.push(current);
rows.push(row);
row=[];
current='';
}

}else{

current += char;

}

}

if(current || row.length){
row.push(current);
rows.push(row);
}

return rows;

}

/* LOAD PRODUCTS */

async function loadProducts(){

try{

const response =
await fetch(CSV_URL);

const csv =
await response.text();

const rows =
parseCSV(csv);

allProducts = [];

for(let i=1;i<rows.length;i++){

const cols = rows[i];

if(!cols[0]) continue;

const product = {

sku: clean(cols[0]),
brand: clean(cols[1]),
item: clean(cols[2]),
price: clean(cols[3]),
stock: clean(cols[4]),
category: clean(cols[5]),
size: clean(cols[6]),
flavour: clean(cols[7]),
image1: clean(cols[8]),
image2: clean(cols[9]),
image3: clean(cols[10]),
bullet1: clean(cols[11]),
bullet2: clean(cols[12]),
bullet3: clean(cols[13]),
bullet4: clean(cols[14]),
servings: clean(cols[15])

};

allProducts.push(product);

}

groupProducts();

renderCategories(groupedProducts);

}catch(error){

console.log(error);

}

}

/* GROUP PRODUCTS */

function groupProducts(){

const map = {};

allProducts.forEach(product=>{

const key =
(product.item || "").toLowerCase()
+
"|"
+
(product.size || "").toLowerCase();

if(!map[key]){

map[key] = {

title: product.item,
category: product.category,
brand: product.brand,
size: product.size,
products: []

};

}

map[key].products.push(product);

});

groupedProducts = Object.values(map);

}

/* FILTER VIEW */

function setView(type, el){

currentView = type;

document.querySelectorAll(".filter-btn")
.forEach(btn=>btn.classList.remove("active"));

el.classList.add("active");

renderCategories(groupedProducts);

}

/* PRODUCT CARD */

function createCard(first, group){

return `

<div
class="card"
onclick="openModal('${encodeURIComponent(group.title)}|${encodeURIComponent(group.size)}')">

<div class="product-image">

<img
src="${first.image1 || 'https://via.placeholder.com/400x400?text=No+Image'}"
loading="lazy">

</div>

<div class="product-content">

<div class="product-title">
${group.title}
</div>

<div class="product-meta">
${group.brand}
</div>

<div class="product-meta">
${group.size || ''}
</div>

<div class="product-price">
${first.price ? `₹${first.price}` : 'Out Of Stock'}
</div>

<div class="stock ${first.stock.toLowerCase().includes('out') ? 'outstock' : 'instock'}">
${first.stock}
</div>

<button class="card-btn">

${first.stock.toLowerCase().includes('out')
?
'Out Of Stock'
:
'View Product'}

</button>

</div>

</div>

`;

}

/* RENDER */

function renderCategories(products){

const container =
document.getElementById("allCategories");

container.innerHTML = "";

/* ASSORTED */

if(currentView === "assorted"){

const section =
document.createElement("div");

section.className =
"category-section";

section.innerHTML = `

<div class="category-title">
All Products
</div>

<div class="products-row">

${products.map(group=>{

const first = group.products[0];

return createCard(first, group);

}).join("")}

</div>

`;

container.appendChild(section);

return;

}

/* BRAND */

if(currentView === "brand"){

const brands = {};

products.forEach(group=>{

if(!brands[group.brand]){
brands[group.brand] = [];
}

brands[group.brand].push(group);

});

Object.keys(brands).forEach(brand=>{

const section =
document.createElement("div");

section.className =
"category-section";

section.innerHTML = `

<div class="category-title">
${brand}
</div>

<div class="products-row">

${brands[brand].map(group=>{

const first = group.products[0];

return createCard(first, group);

}).join("")}

</div>

`;

container.appendChild(section);

});

return;

}

/* CATEGORY */

const categories = {};

products.forEach(group=>{

if(!categories[group.category]){
categories[group.category] = [];
}

categories[group.category].push(group);

});

Object.keys(categories).forEach(category=>{

const section =
document.createElement("div");

section.className =
"category-section";

section.innerHTML = `

<div class="category-title">
${category}
</div>

<div class="products-row">

${categories[category].map(group=>{

const first = group.products[0];

return createCard(first, group);

}).join("")}

</div>

`;

container.appendChild(section);

});

}

/* SEARCH */

function searchProducts(){

const text =
document.getElementById("searchInput")
.value
.toLowerCase();

if(!text){

renderCategories(groupedProducts);
return;

}

const filtered =
groupedProducts.filter(group =>

(group.title || "").toLowerCase().includes(text)
||
(group.brand || "").toLowerCase().includes(text)
||
(group.category || "").toLowerCase().includes(text)

);

renderCategories(filtered);

}

/* OPEN MODAL */

function openModal(data){

const split =
data.split("|");

const title =
decodeURIComponent(split[0]);

const size =
decodeURIComponent(split[1]);

const group =
groupedProducts.find(g =>

g.title === title
&&
g.size === size

);

const first =
group.products[0];

document.getElementById("modal").style.display =
"flex";

updateModal(group, first);

}

/* UPDATE MODAL */

function updateModal(group, product){

document.getElementById("mainImage").src =
product.image1 || "";

document.getElementById("mainImage").onclick =
function(){

document.getElementById("imagePopup").style.display =
"flex";

document.getElementById("popupImage").src =
product.image1;

};

document.getElementById("modalTitle").innerText =
group.title;

document.getElementById("modalPrice").innerText =
product.price
?
`₹${product.price}`
:
"Out Of Stock";

document.getElementById("modalStock").innerText =
product.stock || "";

document.getElementById("modalStock").className =
`stock ${product.stock.toLowerCase().includes('out') ? 'outstock' : 'instock'}`;

document.getElementById("modalBrand").innerText =
`Brand: ${product.brand}`;

document.getElementById("modalCategory").innerText =
`Category: ${product.category}`;

document.getElementById("servingsBox").innerText =
product.servings
?
`${product.servings} SERVINGS`
:
"";

document.getElementById("modalFeatures").innerHTML = `

${product.bullet1 ? `<li>${product.bullet1}</li>` : ''}
${product.bullet2 ? `<li>${product.bullet2}</li>` : ''}
${product.bullet3 ? `<li>${product.bullet3}</li>` : ''}
${product.bullet4 ? `<li>${product.bullet4}</li>` : ''}

`;

/* IMAGES */

const images =
[
product.image1,
product.image2,
product.image3
].filter(Boolean);

document.getElementById("thumbs").innerHTML =

images.map(img=>`

<img
class="thumb"
src="${img}"
onclick="changeImage('${img}')">

`).join("");

/* FLAVOURS */

const flavourContainer =
document.getElementById("flavourOptions");

flavourContainer.innerHTML = "";

const flavours =
[...new Set(group.products.map(p=>p.flavour).filter(Boolean))];

flavours.forEach(flavour=>{

const btn =
document.createElement("button");

btn.className =
`option-btn ${flavour === product.flavour ? 'active' : ''}`;

btn.innerText =
flavour;

btn.onclick = ()=>{

const matching =
group.products.filter(p => p.flavour === flavour);

const firstAvailable =
matching.find(p => !p.stock.toLowerCase().includes('out'))
|| matching[0];

updateModal(group, firstAvailable);

};

flavourContainer.appendChild(btn);

});

/* SIZES */

const sizeContainer =
document.getElementById("sizeOptions");

sizeContainer.innerHTML = "";

const sizes =
group.products.filter(p =>

p.flavour === product.flavour

);

sizes.forEach(sizeProduct=>{

const btn =
document.createElement("button");

const out =
sizeProduct.stock.toLowerCase().includes('out');

btn.className =
`option-btn
${sizeProduct.size === product.size ? 'active' : ''}
${out ? 'disabled' : ''}`;

btn.innerText =
sizeProduct.size || "Default";

if(!out){

btn.onclick = ()=>{

updateModal(group, sizeProduct);

};

}

sizeContainer.appendChild(btn);

});

/* WHATSAPP */

document.getElementById("orderBtn").onclick = ()=>{

const message =

`Hello,

I want to order:

${group.title}

Flavor: ${product.flavour || 'N/A'}

Size: ${product.size || 'N/A'}

Price: ${product.price ? `₹${product.price}` : 'Out Of Stock'}

Please share payment details.`;

window.open(

`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(message)}`,

"_blank"

);

};

}

/* IMAGE */

function changeImage(src){

document.getElementById("mainImage").src =
src;

document.getElementById("popupImage").src =
src;

}

/* CLOSE */

function closeModal(){

document.getElementById("modal").style.display =
"none";

}

function closeImagePopup(){

document.getElementById("imagePopup").style.display =
"none";

}

window.onclick = function(event){

const modal =
document.getElementById("modal");

if(event.target === modal){

closeModal();

}

};

loadProducts();

</script>

</body>

</html>
