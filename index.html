<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AL HAYAT TRADING COMPANY</title>

<link rel="icon" href="https://i.postimg.cc/ncHVXSW3/LOGO.jpg">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#f5f1ea;
font-family:'Inter',sans-serif;
overflow-x:hidden;
color:#111;
}

/* HEADER */

header{
position:sticky;
top:0;
z-index:99999;
background:rgba(255,255,255,.94);
backdrop-filter:blur(14px);
padding:14px 32px;
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:1px solid rgba(0,0,0,.07);
}

.logo{
display:flex;
align-items:center;
gap:16px;
text-decoration:none;
}

.logo img{
width:68px;
height:68px;
border-radius:18px;
object-fit:cover;
box-shadow:0 8px 22px rgba(0,0,0,.14);
}

.logo-text h1{
font-family:'Cinzel',serif;
font-size:28px;
font-weight:800;
letter-spacing:2px;
line-height:1;
color:#111;
}

.logo-text span{
font-size:11px;
letter-spacing:4px;
color:#888;
}

/* HERO */

.hero{
height:460px;
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438?q=80&w=1800&auto=format&fit=crop');

background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

.hero-content{
max-width:1000px;
}

.hero h2{
font-family:'Cinzel',serif;
font-size:72px;
line-height:1.2;
color:white;
margin-bottom:18px;
letter-spacing:2px;
}

.hero p{
font-size:20px;
color:#eee;
line-height:1.7;
}

/* FILTER BAR */

.topbar{
position:sticky;
top:96px;
z-index:9999;
background:white;
padding:18px 26px;
display:flex;
gap:18px;
align-items:center;
flex-wrap:wrap;
border-bottom:1px solid rgba(0,0,0,.06);
}

.filter{
height:56px;
padding:0 18px;
border-radius:14px;
border:1px solid rgba(0,0,0,.1);
background:white;
font-size:15px;
font-weight:600;
outline:none;
min-width:230px;
}

.search-box{
flex:1;
min-width:260px;
height:56px;
background:#f7f7f7;
border-radius:14px;
display:flex;
align-items:center;
padding:0 18px;
border:1px solid rgba(0,0,0,.08);
}

.search-box input{
flex:1;
border:none;
background:none;
outline:none;
font-size:16px;
font-family:'Inter',sans-serif;
}

.search-box button{
background:none;
border:none;
font-size:22px;
cursor:pointer;
}

/* PRODUCTS */

#productsContainer{
padding:38px 28px 80px;
}

.section-title{
font-family:'Cinzel',serif;
font-size:42px;
margin-bottom:26px;
font-weight:700;
}

.products-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
gap:28px;
}

.card{
background:white;
border-radius:26px;
overflow:hidden;
box-shadow:0 10px 32px rgba(0,0,0,.08);
transition:.25s;
cursor:pointer;
border:1px solid rgba(0,0,0,.05);
display:flex;
flex-direction:column;
}

.card:hover{
transform:translateY(-6px);
}

.card-image{
height:310px;
background:white;
display:flex;
align-items:center;
justify-content:center;
padding:24px;
position:relative;
}

.card-image img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

.stock-badge{
position:absolute;
top:16px;
left:16px;
padding:8px 14px;
border-radius:100px;
font-size:12px;
font-weight:700;
}

.instock{
background:#e7f8ec;
color:#198754;
}

.outstock{
background:#fdecec;
color:#dc3545;
}

.card-content{
padding:24px;
display:flex;
flex-direction:column;
flex:1;
}

.brand{
font-size:12px;
font-weight:700;
letter-spacing:2px;
color:#777;
margin-bottom:12px;
}

.title{
font-family:'Cinzel',serif;
font-size:22px;
line-height:1.45;
min-height:120px;
margin-bottom:18px;
}

.price{
font-size:34px;
font-weight:800;
margin-bottom:14px;
}

.meta{
font-size:14px;
color:#666;
margin-bottom:8px;
}

.view-btn{
margin-top:auto;
height:54px;
border:none;
border-radius:14px;
background:#111;
color:white;
font-size:15px;
font-weight:700;
cursor:pointer;
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center;
padding:18px;
z-index:999999;
}

.modal-box{
width:100%;
max-width:1320px;
height:92vh;
background:white;
border-radius:28px;
overflow:hidden;
display:grid;
grid-template-columns:1fr 1fr;
position:relative;
}

.close{
position:absolute;
top:16px;
right:20px;
font-size:42px;
cursor:pointer;
z-index:99;
}

/* LEFT */

.modal-left{
background:#fafafa;
padding:36px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
position:relative;
}

.main-image{
width:100%;
height:430px;
object-fit:contain;
}

.image-nav{
position:absolute;
top:50%;
transform:translateY(-50%);
width:52px;
height:52px;
background:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,.15);
user-select:none;
}

.prev-btn{
left:14px;
}

.next-btn{
right:14px;
}

.thumbs{
display:flex;
gap:12px;
margin-top:24px;
flex-wrap:wrap;
justify-content:center;
}

.thumb{
width:86px;
height:86px;
border-radius:14px;
border:2px solid #ddd;
padding:8px;
cursor:pointer;
object-fit:contain;
background:white;
}

/* RIGHT */

.modal-right{
padding:38px;
overflow-y:auto;
display:flex;
flex-direction:column;
height:100%;
}

.modal-title{
font-family:'Cinzel',serif;
font-size:38px;
line-height:1.4;
margin-bottom:16px;
}

.modal-price{
font-size:44px;
font-weight:800;
margin-bottom:18px;
}

.servings{
display:inline-flex;
align-items:center;
justify-content:center;
padding:10px 18px;
border-radius:100px;
background:#111;
color:white;
font-size:14px;
font-weight:700;
margin-bottom:18px;
width:max-content;
}

.detail{
font-size:15px;
margin-bottom:10px;
color:#444;
}

.option-title{
font-size:16px;
font-weight:700;
margin-top:24px;
margin-bottom:14px;
}

.options{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.option{
padding:11px 15px;
border-radius:12px;
border:1px solid #ccc;
font-size:14px;
cursor:pointer;
background:white;
transition:.2s;
}

.option.active{
background:#111;
color:white;
border-color:#111;
}

.option.disabled{
opacity:.35;
text-decoration:line-through;
cursor:not-allowed;
}

.features{
margin-top:24px;
padding-left:20px;
}

.features li{
margin-bottom:12px;
font-size:15px;
line-height:1.7;
color:#444;
}

/* FIXED BUTTON */

.order-wrap{
margin-top:auto;
padding-top:24px;
position:sticky;
bottom:0;
background:white;
}

.order-btn{
width:100%;
height:62px;
border:none;
border-radius:16px;
background:#25D366;
color:white;
font-size:18px;
font-weight:800;
cursor:pointer;
box-shadow:0 8px 20px rgba(37,211,102,.25);
}

/* FLOAT BUTTON */

.float-btn{
position:fixed;
right:22px;
bottom:22px;
width:72px;
height:72px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
text-decoration:none;
color:white;
z-index:999999;
box-shadow:0 10px 24px rgba(37,211,102,.35);
}

/* MOBILE */

@media(max-width:980px){

.hero{
height:340px;
}

.hero h2{
font-size:42px;
}

.hero p{
font-size:16px;
}

.modal-box{
grid-template-columns:1fr;
height:96vh;
overflow-y:auto;
}

.modal-left{
padding:18px;
min-height:420px;
}

.modal-right{
padding:22px;
}

.main-image{
height:280px;
}

.modal-title{
font-size:28px;
}

.modal-price{
font-size:34px;
}

.products-grid{
grid-template-columns:1fr 1fr;
}

.topbar{
top:92px;
}

}

@media(max-width:650px){

header{
padding:12px 16px;
}

.logo img{
width:56px;
height:56px;
}

.logo-text h1{
font-size:20px;
}

.hero h2{
font-size:32px;
}

.products-grid{
grid-template-columns:1fr;
}

.title{
font-size:19px;
min-height:auto;
}

.section-title{
font-size:28px;
}

.modal{
padding:0;
}

.modal-box{
height:100vh;
border-radius:0;
}

.modal-left{
min-height:360px;
}

.main-image{
height:240px;
}

.thumb{
width:72px;
height:72px;
}

.modal-title{
font-size:24px;
}

.modal-price{
font-size:30px;
}

.order-btn{
height:58px;
font-size:16px;
}

.topbar{
padding:14px;
}

}

</style>

</head>

<body>

<header>

<a class="logo" href="#">

<img src="https://i.postimg.cc/ncHVXSW3/LOGO.jpg">

<div class="logo-text">
<h1>AL HAYAT</h1>
<span>TRADING COMPANY</span>
</div>

</a>

</header>

<section class="hero">

<div class="hero-content">

<h2>Premium Imported Supplements</h2>

<p>
Trusted global brands for performance, recovery and elite fitness goals
</p>

</div>

</section>

<div class="topbar">

<select id="viewFilter" class="filter">

<option value="all">Assorted Products</option>
<option value="brand">Shop By Brand</option>
<option value="category">Shop By Category</option>

</select>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search supplements...">

<button>
🔍
</button>

</div>

</div>

<div id="productsContainer"></div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-box">

<div class="close" onclick="closeModal()">
×
</div>

<div class="modal-left">

<div class="image-nav prev-btn" onclick="prevImage()">
‹
</div>

<img id="mainImage" class="main-image">

<div class="image-nav next-btn" onclick="nextImage()">
›
</div>

<div class="thumbs" id="thumbs"></div>

</div>

<div class="modal-right">

<div id="modalTitle" class="modal-title"></div>

<div id="modalPrice" class="modal-price"></div>

<div id="servings" class="servings"></div>

<div id="stock" class="detail"></div>

<div id="size" class="detail"></div>

<div id="flavour" class="detail"></div>

<div class="option-title">
Flavours
</div>

<div id="flavourOptions" class="options"></div>

<div class="option-title">
Sizes
</div>

<div id="sizeOptions" class="options"></div>

<ul id="features" class="features"></ul>

<div class="order-wrap">

<button id="orderBtn" class="order-btn">
Order On WhatsApp
</button>

</div>

</div>

</div>

</div>

<!-- FLOAT -->

<a
href="https://wa.me/917710077786"
class="float-btn"
target="_blank">

💬

</a>

<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQZimj_keJIooGDnz0sOvML4cjwbQ8eZBnQ3CQ1xyiORgHssrZPaCYzqdbFz-EmKmFrAqBgV6C3kLUK/pub?output=csv";

let allProducts = [];
let currentImages = [];
let currentImageIndex = 0;
let currentGroup = [];
let selectedProduct = null;

async function loadProducts(){

const response = await fetch(CSV_URL);
const csv = await response.text();

const rows = csv.trim().split("\n");

allProducts = rows.slice(1).map(row=>{

const cols =
row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g) || [];

const clean = (i)=>
(cols[i] || "").replace(/"/g,'').trim();

return{

sku: clean(0),
brand: clean(1),
item: clean(2),
price: clean(3),
stock: clean(4),
category: clean(5),
size: clean(6),
flavour: clean(7),
image1: clean(8),
image2: clean(9),
image3: clean(10),
bullet1: clean(11),
bullet2: clean(12),
bullet3: clean(13),
bullet4: clean(14),
servings: clean(15)

};

});

renderProducts();

}

function renderProducts(){

const container =
document.getElementById("productsContainer");

container.innerHTML = "";

const mode =
document.getElementById("viewFilter").value;

const search =
document.getElementById("searchInput")
.value
.toLowerCase();

const filtered =
allProducts.filter(p=>

(p.item + p.brand + p.flavour + p.category)
.toLowerCase()
.includes(search)

);

if(mode === "all"){

renderSection("All Products",filtered);

}

if(mode === "brand"){

const groups = {};

filtered.forEach(p=>{

if(!groups[p.brand]) groups[p.brand] = [];

groups[p.brand].push(p);

});

Object.keys(groups).forEach(name=>{

renderSection(name,groups[name]);

});

}

if(mode === "category"){

const groups = {};

filtered.forEach(p=>{

if(!groups[p.category]) groups[p.category] = [];

groups[p.category].push(p);

});

Object.keys(groups).forEach(name=>{

renderSection(name,groups[name]);

});

}

}

function renderSection(title,data){

const container =
document.getElementById("productsContainer");

const unique = {};

data.forEach(p=>{

const key =
p.item;

if(!unique[key]){

unique[key] = p;

}

});

const products =
Object.values(unique);

const section =
document.createElement("div");

section.innerHTML = `

<div class="section-title">
${title}
</div>

<div class="products-grid">

${products.map(product=>`

<div class="card"
onclick="openModal('${product.item.replace(/'/g,"")}')">

<div class="card-image">

<div class="stock-badge ${product.stock.toLowerCase().includes('out') ? 'outstock' : 'instock'}">
${product.stock}
</div>

<img src="${product.image1 || 'https://via.placeholder.com/300'}">

</div>

<div class="card-content">

<div class="brand">
${product.brand}
</div>

<div class="title">
${product.item}
</div>

<div class="price">
₹${product.price || "-"}
</div>

<div class="meta">
${product.category || ""}
</div>

<button class="view-btn">
View Product
</button>

</div>

</div>

`).join("")}

</div>

`;

container.appendChild(section);

}

function openModal(item){

currentGroup =
allProducts.filter(p=>p.item === item);

selectedProduct =
currentGroup[0];

updateModal(selectedProduct);

document.getElementById("modal").style.display =
"flex";

document.body.style.overflow =
"hidden";

}

function updateModal(product){

selectedProduct = product;

document.getElementById("modalTitle").innerText =
product.item;

document.getElementById("modalPrice").innerText =
product.price ? `₹${product.price}` : "Price Unavailable";

document.getElementById("servings").innerText =
product.servings ? `${product.servings} SERVINGS` : "—";

document.getElementById("stock").innerHTML =
`<b>Status:</b> ${product.stock}`;

document.getElementById("size").innerHTML =
`<b>Size:</b> ${product.size || "-"}`;

document.getElementById("flavour").innerHTML =
`<b>Flavor:</b> ${product.flavour || "-"}`;

currentImages = [
product.image1,
product.image2,
product.image3
].filter(Boolean);

currentImageIndex = 0;

document.getElementById("mainImage").src =
currentImages[0] || "";

document.getElementById("thumbs").innerHTML =

currentImages.map((img,index)=>`

<img
class="thumb"
src="${img}"
onclick="setImage(${index})">

`).join("");

document.getElementById("features").innerHTML =

[
product.bullet1,
product.bullet2,
product.bullet3,
product.bullet4
]

.filter(Boolean)

.map(f=>`<li>${f}</li>`)

.join("");

/* UNIQUE FLAVOURS */

const flavourMap = {};

currentGroup.forEach(p=>{

if(!flavourMap[p.flavour]){

flavourMap[p.flavour] = p;

}

});

document.getElementById("flavourOptions").innerHTML =

Object.values(flavourMap).map(p=>`

<div
class="option ${p.flavour === product.flavour ? 'active' : ''}"
onclick="selectFlavour('${p.flavour.replace(/'/g,"")}')">

${p.flavour || "-"}

</div>

`).join("");

/* SIZES */

const sizeProducts =
currentGroup.filter(p=>p.flavour === product.flavour);

document.getElementById("sizeOptions").innerHTML =

sizeProducts.map(p=>`

<div
class="option
${p.size === product.size ? 'active' : ''}
${p.stock.toLowerCase().includes('out') ? 'disabled' : ''}"

onclick="${p.stock.toLowerCase().includes('out') ? '' : `selectSize('${p.size.replace(/'/g,"")}')`}">

${p.size}

</div>

`).join("");

document.getElementById("orderBtn").onclick = function(){

window.open(

`https://wa.me/917710077786?text=${encodeURIComponent(

`Hello, I want to order:

${product.item}

Flavor: ${product.flavour}

Size: ${product.size}

Price: ₹${product.price}`

)}`,

"_blank"

);

};

}

function selectFlavour(flavour){

const product =
currentGroup.find(p=>p.flavour === flavour);

if(product){

updateModal(product);

}

}

function selectSize(size){

const product =
currentGroup.find(p=>

p.flavour === selectedProduct.flavour
&&
p.size === size

);

if(product){

updateModal(product);

}

}

function setImage(index){

currentImageIndex = index;

document.getElementById("mainImage").src =
currentImages[index];

}

function prevImage(){

currentImageIndex--;

if(currentImageIndex < 0){

currentImageIndex =
currentImages.length - 1;

}

setImage(currentImageIndex);

}

function nextImage(){

currentImageIndex++;

if(currentImageIndex >= currentImages.length){

currentImageIndex = 0;

}

setImage(currentImageIndex);

}

document.addEventListener("keydown",e=>{

if(document.getElementById("modal").style.display === "flex"){

if(e.key === "ArrowLeft") prevImage();

if(e.key === "ArrowRight") nextImage();

if(e.key === "Escape") closeModal();

}

});

function closeModal(){

document.getElementById("modal").style.display =
"none";

document.body.style.overflow =
"auto";

}

document.getElementById("viewFilter")
.addEventListener("change",renderProducts);

document.getElementById("searchInput")
.addEventListener("keyup",renderProducts);

window.onclick = function(e){

if(e.target.id === "modal"){

closeModal();

}

};

loadProducts();

</script>

</body>
</html>
