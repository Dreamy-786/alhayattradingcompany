<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AL HAYAT TRADING</title>

<link rel="icon" type="image/png" href="https://i.postimg.cc/Y9K0Qw1S/logo.png">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
font-family:'Inter',sans-serif;
color:#fff;
overflow-x:hidden;
}

h1,h2,h3,h4,h5{
font-family:'Cormorant Garamond',serif;
letter-spacing:1px;
}

a{
text-decoration:none;
color:inherit;
}

.topbar{
background:#000;
padding:18px 30px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,0.08);
position:sticky;
top:0;
z-index:999;
}

.brand{
display:flex;
align-items:center;
gap:18px;
cursor:pointer;
}

.brand img{
width:80px;
height:80px;
object-fit:contain;
border-radius:18px;
background:#111;
}

.brand-text h1{
font-size:72px;
line-height:0.9;
font-weight:600;
}

.brand-text p{
font-size:18px;
letter-spacing:8px;
margin-top:12px;
color:#bbb;
}

.contact{
font-family:'Cormorant Garamond',serif;
font-size:28px;
font-weight:700;
color:#29ff72;
}

.banner{
width:100%;
height:460px;
overflow:hidden;
background:#111;
}

.banner img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.filter-bar{
background:#050505;
padding:26px;
display:flex;
align-items:center;
gap:20px;
position:sticky;
top:118px;
z-index:998;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.filter-btn{
padding:18px 34px;
border:none;
border-radius:60px;
background:#121212;
color:#fff;
font-weight:700;
font-size:17px;
cursor:pointer;
transition:0.3s;
}

.filter-btn.active{
background:#fff;
color:#000;
}

.search{
flex:1;
}

.search input{
width:100%;
padding:20px 28px;
background:#111;
border:none;
outline:none;
border-radius:60px;
color:#fff;
font-size:18px;
}

.section{
padding:40px 28px;
}

.section-head{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:30px;
}

.section-head h2{
font-size:70px;
font-weight:600;
}

.arrow-wrap{
display:flex;
gap:14px;
}

.arrow{
width:60px;
height:60px;
border-radius:50%;
background:#111;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
transition:0.3s;
}

.arrow:hover{
background:#fff;
color:#000;
}

.row-scroll{
display:flex;
gap:24px;
overflow-x:auto;
scroll-behavior:smooth;
padding-bottom:10px;
}

.row-scroll::-webkit-scrollbar{
display:none;
}

.card{
min-width:300px;
max-width:300px;
background:#0f0f0f;
border:1px solid rgba(255,255,255,0.06);
border-radius:28px;
overflow:hidden;
transition:0.35s;
cursor:pointer;
display:flex;
flex-direction:column;
}

.card:hover{
transform:translateY(-8px);
border-color:rgba(255,255,255,0.18);
}

.card-image{
height:300px;
background:#fff;
padding:20px;
display:flex;
align-items:center;
justify-content:center;
}

.card-image img{
width:100%;
height:100%;
object-fit:contain;
}

.card-content{
padding:22px;
display:flex;
flex-direction:column;
gap:10px;
}

.card-brand{
font-size:13px;
letter-spacing:3px;
color:#999;
text-transform:uppercase;
}

.card-title{
font-size:24px;
line-height:1.2;
font-family:'Cormorant Garamond',serif;
min-height:72px;
}

.card-price{
font-size:34px;
font-weight:700;
}

.stock{
font-size:15px;
font-weight:600;
}

.instock{
color:#28ff75;
}

.outstock{
color:#ff4545;
text-decoration:line-through;
}

.view-btn{
margin-top:14px;
padding:15px;
border:none;
border-radius:14px;
background:#fff;
color:#000;
font-weight:700;
cursor:pointer;
font-size:16px;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.86);
z-index:9999;
display:none;
align-items:center;
justify-content:center;
padding:20px;
}

.modal-box{
width:100%;
max-width:1400px;
height:92vh;
background:#fff;
color:#000;
border-radius:28px;
overflow:hidden;
display:flex;
position:relative;
}

.close{
position:absolute;
right:26px;
top:18px;
font-size:54px;
cursor:pointer;
z-index:3;
}

.modal-left{
width:50%;
background:#f8f8f8;
padding:30px;
display:flex;
flex-direction:column;
justify-content:center;
position:relative;
}

.main-image{
width:100%;
height:520px;
object-fit:contain;
}

.image-nav{
position:absolute;
top:50%;
transform:translateY(-50%);
width:62px;
height:62px;
border-radius:50%;
background:#fff;
box-shadow:0 0 20px rgba(0,0,0,0.15);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
}

.prev{
left:20px;
}

.next{
right:20px;
}

.thumb-row{
display:flex;
gap:14px;
margin-top:20px;
justify-content:center;
}

.thumb{
width:92px;
height:92px;
border:2px solid #ddd;
border-radius:14px;
overflow:hidden;
cursor:pointer;
background:#fff;
}

.thumb img{
width:100%;
height:100%;
object-fit:contain;
}

.modal-right{
width:50%;
padding:36px;
overflow-y:auto;
}

.modal-title{
font-size:54px;
line-height:1.1;
margin-bottom:20px;
}

.modal-price{
font-size:58px;
font-weight:800;
margin-bottom:10px;
}

.flavour-grid,
.size-grid{
display:flex;
flex-wrap:wrap;
gap:12px;
margin-top:14px;
}

.option{
padding:12px 18px;
border-radius:12px;
border:1px solid #ddd;
background:#fff;
cursor:pointer;
font-weight:600;
}

.option.active{
background:#000;
color:#fff;
}

.option.out{
opacity:0.4;
text-decoration:line-through;
}

.order-btn{
margin-top:24px;
width:100%;
padding:22px;
background:#22d35f;
color:#fff;
font-size:24px;
font-weight:800;
border:none;
border-radius:18px;
cursor:pointer;
}

.bullets{
margin-top:22px;
padding-left:18px;
line-height:1.8;
font-size:17px;
}

.footer{
background:#0a0a0a;
padding:60px 30px;
border-top:1px solid rgba(255,255,255,0.08);
margin-top:50px;
}

.footer h3{
font-size:42px;
margin-bottom:20px;
}

.footer p{
color:#bbb;
font-size:18px;
line-height:1.8;
}

.whatsapp-float{
position:fixed;
right:24px;
bottom:24px;
width:82px;
height:82px;
border-radius:50%;
background:#25D366;
display:flex;
align-items:center;
justify-content:center;
font-size:38px;
z-index:999;
box-shadow:0 0 30px rgba(37,211,102,0.5);
}

@media(max-width:900px){

.topbar{
padding:16px;
}

.brand img{
width:58px;
height:58px;
}

.brand-text h1{
font-size:34px;
}

.brand-text p{
font-size:10px;
letter-spacing:4px;
}

.contact{
display:none;
}

.banner{
height:220px;
}

.filter-bar{
flex-wrap:wrap;
top:90px;
padding:14px;
}

.filter-btn{
padding:14px 18px;
font-size:14px;
}

.search{
width:100%;
}

.section{
padding:26px 16px;
}

.section-head h2{
font-size:42px;
}

.card{
min-width:220px;
max-width:220px;
}

.card-image{
height:220px;
}

.modal-box{
flex-direction:column;
height:95vh;
overflow-y:auto;
}

.modal-left,
.modal-right{
width:100%;
}

.main-image{
height:300px;
}

.modal-title{
font-size:34px;
}

.modal-price{
font-size:40px;
}

}

</style>
</head>

<body>

<div class="topbar">

<div class="brand" onclick="window.scrollTo({top:0,behavior:'smooth'})">

<img src="https://i.postimg.cc/Y9K0Qw1S/logo.png">

<div class="brand-text">
<h1>AL HAYAT TRADING</h1>
<p>PREMIUM IMPORTS</p>
</div>

</div>

<div class="contact">
📞 +91 77100 77786
</div>

</div>

<div class="banner">
<img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?q=80&w=1800&auto=format&fit=crop">
</div>

<div class="filter-bar">

<button class="filter-btn active" onclick="showFeatured()">FEATURED DEALS</button>

<button class="filter-btn" onclick="showBrands()">SHOP BY BRAND</button>

<button class="filter-btn" onclick="showCategories()">SHOP BY CATEGORY</button>

<div class="search">
<input type="text" id="searchInput" placeholder="Search Products...">
</div>

</div>

<div class="section">

<div class="section-head">

<h2 id="sectionTitle">FEATURED DEALS</h2>

<div class="arrow-wrap">
<div class="arrow" onclick="scrollLeftRow()">‹</div>
<div class="arrow" onclick="scrollRightRow()">›</div>
</div>

</div>

<div class="row-scroll" id="productRow"></div>

</div>

<div class="footer">

<h3>AL HAYAT TRADING</h3>

<p>
Mumbai, Maharashtra, India<br><br>
Imported Sports Nutrition & Wellness Products<br><br>
WhatsApp: +91 77100 77786
</p>

</div>

<a class="whatsapp-float" href="https://wa.me/917710077786" target="_blank">
💬
</a>

<div class="modal" id="modal">

<div class="modal-box">

<div class="close" onclick="closeModal()">×</div>

<div class="modal-left">

<div class="image-nav prev" onclick="prevImage()">‹</div>
<div class="image-nav next" onclick="nextImage()">›</div>

<img id="mainImage" class="main-image">

<div class="thumb-row" id="thumbRow"></div>

</div>

<div class="modal-right">

<h1 class="modal-title" id="modalTitle"></h1>

<div class="modal-price" id="modalPrice"></div>

<div id="stockText"></div>

<h3 style="margin-top:25px;">Choose Flavor</h3>
<div class="flavour-grid" id="flavourGrid"></div>

<h3 style="margin-top:25px;">Choose Size</h3>
<div class="size-grid" id="sizeGrid"></div>

<button class="order-btn" id="orderBtn">
Order On WhatsApp
</button>

<ul class="bullets" id="bullets"></ul>

</div>

</div>

</div>

<script>

const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQZimj_keJIooGDnz0sOvML4cjwbQ8eZBnQ3CQ1xyiORgHssrZPaCYzqdbFz-EmKmFrAqBgV6C3kLUK/pub?output=csv";

let allProducts = [];
let currentProducts = [];
let currentIndex = 0;
let currentImages = [];

const row = document.getElementById("productRow");

Papa.parse(csvURL,{
download:true,
header:true,
complete:function(results){

allProducts = results.data.filter(p => p.ITEM);

showFeatured();

document.getElementById("searchInput").addEventListener("input",function(){
const term = this.value.toLowerCase();

const filtered = allProducts.filter(p =>
(p.ITEM || "").toLowerCase().includes(term) ||
(p.BRAND || "").toLowerCase().includes(term) ||
(p.FLAVOUR || "").toLowerCase().includes(term)
);

renderProducts(filtered);
});

}
});

function randomProducts(arr,count){
return [...arr].sort(()=>0.5-Math.random()).slice(0,count);
}

function setActive(btnIndex){

document.querySelectorAll(".filter-btn").forEach((b,i)=>{
b.classList.toggle("active",i===btnIndex);
});

}

function showFeatured(){

setActive(0);

document.getElementById("sectionTitle").innerText="FEATURED DEALS";

const featured = randomProducts(allProducts,25);

renderProducts(featured);

}

function showBrands(){

setActive(1);

document.getElementById("sectionTitle").innerText="SHOP BY BRAND";

const grouped = [];

const used = new Set();

allProducts.forEach(p=>{

if(!used.has(p.BRAND)){

used.add(p.BRAND);

grouped.push(p);

}

});

renderProducts(grouped);

}

function showCategories(){

setActive(2);

document.getElementById("sectionTitle").innerText="SHOP BY CATEGORY";

const grouped = [];

const used = new Set();

allProducts.forEach(p=>{

if(!used.has(p.Category)){

used.add(p.Category);

grouped.push(p);

}

});

renderProducts(grouped);

}

function renderProducts(products){

row.innerHTML="";

products.forEach((p,index)=>{

const stock = (p.STOCK || "").toLowerCase();

row.innerHTML += `

<div class="card" onclick='openProduct(${JSON.stringify(p).replace(/'/g,"&apos;")})'>

<div class="card-image">
<img src="${p.IMAGE1_FRONT}">
</div>

<div class="card-content">

<div class="card-brand">${p.BRAND || ""}</div>

<div class="card-title">${p.ITEM || ""}</div>

<div class="card-price">₹${p.PRICE || ""}</div>

<div class="stock ${stock.includes("out") ? "outstock" : "instock"}">
${p.STOCK || ""}
</div>

<button class="view-btn">VIEW PRODUCT</button>

</div>

</div>

`;

});

}

function openProduct(product){

document.getElementById("modal").style.display="flex";

document.body.style.overflow="hidden";

const related = allProducts.filter(p=>p.ITEM===product.ITEM);

const uniqueFlavours = [...new Map(
related.map(item=>[item.FLAVOUR,item])
).values()];

const uniqueSizes = [...new Map(
related.map(item=>[item.Size,item])
).values()];

document.getElementById("modalTitle").innerText = product.ITEM;

document.getElementById("modalPrice").innerText = "₹"+product.PRICE;

const stock = (product.STOCK || "").toLowerCase();

document.getElementById("stockText").innerHTML = `
<div class="stock ${stock.includes("out") ? "outstock" : "instock"}">
${product.STOCK}
</div>
`;

currentImages = [
product.IMAGE1_FRONT,
product.IMAGE2_SIDE,
product.IMAGE3_BACK
].filter(Boolean);

currentIndex = 0;

updateImage();

document.getElementById("thumbRow").innerHTML = currentImages.map((img,i)=>`
<div class="thumb" onclick="changeImage(${i})">
<img src="${img}">
</div>
`).join("");

document.getElementById("flavourGrid").innerHTML = uniqueFlavours.map(f=>`

<div class="option ${(f.STOCK || "").toLowerCase().includes("out") ? "out" : ""}"
onclick='openProduct(${JSON.stringify(f).replace(/'/g,"&apos;")})'>

${f.FLAVOUR || "Unflavoured"}

</div>

`).join("");

document.getElementById("sizeGrid").innerHTML = uniqueSizes.map(s=>`

<div class="option ${(s.STOCK || "").toLowerCase().includes("out") ? "out" : ""}"
onclick='openProduct(${JSON.stringify(s).replace(/'/g,"&apos;")})'>

${s.Size || ""}

</div>

`).join("");

document.getElementById("orderBtn").onclick = function(){

window.open(
`https://wa.me/917710077786?text=Hi,%20I%20want%20to%20order%20${encodeURIComponent(product.ITEM)}%20${encodeURIComponent(product.FLAVOUR || "")}%20${encodeURIComponent(product.Size || "")}`
);

};

document.getElementById("bullets").innerHTML = `
<li>${product.BULLET1 || ""}</li>
<li>${product.BULLET2 || ""}</li>
<li>${product.BULLET3 || ""}</li>
<li>${product.BULLET4 || ""}</li>
`;

}

function closeModal(){

document.getElementById("modal").style.display="none";

document.body.style.overflow="auto";

}

function updateImage(){

document.getElementById("mainImage").src = currentImages[currentIndex];

}

function nextImage(){

currentIndex++;

if(currentIndex >= currentImages.length){
currentIndex = 0;
}

updateImage();

}

function prevImage(){

currentIndex--;

if(currentIndex < 0){
currentIndex = currentImages.length - 1;
}

updateImage();

}

function changeImage(index){

currentIndex = index;

updateImage();

}

function scrollLeftRow(){

row.scrollBy({
left:-900,
behavior:"smooth"
});

}

function scrollRightRow(){

row.scrollBy({
left:900,
behavior:"smooth"
});

}

window.onclick = function(e){

if(e.target.id==="modal"){
closeModal();
}

}

</script>

</body>
</html>
