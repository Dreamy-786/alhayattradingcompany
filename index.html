<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AL HAYAT TRADING COMPANY</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cormorant Garamond',serif;
}

body{
background:#f6f3ee;
color:#111;
overflow-x:hidden;
}

/* HEADER */

header{
background:#000;
padding:18px 35px;
display:flex;
align-items:center;
justify-content:space-between;
position:sticky;
top:0;
z-index:9999;
}

.logo{
display:flex;
align-items:center;
gap:14px;
}

.logo img{
width:60px;
height:60px;
border-radius:12px;
object-fit:cover;
background:white;
}

.logo h1{
font-size:32px;
font-weight:700;
color:white;
letter-spacing:2px;
}

.contact{
color:white;
font-size:18px;
font-weight:600;
}

/* HERO */

.hero{
height:430px;
background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438?q=80&w=1600&auto=format&fit=crop');

background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

.hero-content h2{
font-size:70px;
color:white;
font-weight:700;
margin-bottom:15px;
}

.hero-content p{
font-size:26px;
color:white;
}

/* FILTER BAR */

.sticky-bar{
position:sticky;
top:95px;
z-index:999;
background:white;
padding:18px;
display:flex;
gap:15px;
box-shadow:0 2px 15px rgba(0,0,0,.08);
}

.sticky-bar select,
.sticky-bar input{
height:58px;
border:1px solid #ddd;
padding:0 20px;
border-radius:14px;
font-size:18px;
background:white;
width:100%;
}

/* PRODUCTS */

#allCategories{
padding:30px;
}

.products-row{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
gap:26px;
}

.card{
background:white;
border-radius:24px;
overflow:hidden;
box-shadow:0 5px 18px rgba(0,0,0,.08);
transition:.25s;
cursor:pointer;
display:flex;
flex-direction:column;
}

.card:hover{
transform:translateY(-6px);
}

.product-image{
height:340px;
background:white;
display:flex;
align-items:center;
justify-content:center;
padding:25px;
}

.product-image img{
width:100%;
height:100%;
object-fit:contain;
}

.product-content{
padding:22px;
display:flex;
flex-direction:column;
height:100%;
}

.product-title{
font-size:24px;
font-weight:700;
line-height:1.3;
margin-bottom:14px;
min-height:110px;
}

.product-meta{
font-size:18px;
color:#666;
margin-bottom:8px;
}

.product-price{
font-size:38px;
font-weight:700;
margin:15px 0;
}

.stock{
font-size:18px;
font-weight:700;
margin-bottom:18px;
}

.instock{
color:green;
}

.outstock{
color:red;
}

.card-btn{
margin-top:auto;
width:100%;
height:56px;
border:none;
border-radius:12px;
background:black;
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
display:none;
align-items:center;
justify-content:center;
padding:25px;
z-index:999999;
}

.modal-box{
background:white;
width:100%;
max-width:1350px;
border-radius:24px;
overflow:hidden;
display:grid;
grid-template-columns:1fr 1fr;
max-height:95vh;
overflow-y:auto;
position:relative;
}

.close-modal{
position:absolute;
top:18px;
right:25px;
font-size:44px;
font-weight:700;
cursor:pointer;
z-index:999;
}

.modal-left{
padding:35px;
}

.modal-right{
padding:40px;
min-height:700px;
}

#mainImage{
width:100%;
height:550px;
object-fit:contain;
background:white;
border-radius:20px;
padding:20px;
transition:.3s;
cursor:zoom-in;
}

.zoomed{
transform:scale(1.7);
cursor:zoom-out !important;
position:relative;
z-index:9999;
}

.thumbs{
display:flex;
gap:14px;
margin-top:20px;
flex-wrap:wrap;
}

.thumb{
width:95px;
height:95px;
border-radius:12px;
border:2px solid #ddd;
padding:6px;
object-fit:contain;
cursor:pointer;
background:white;
}

.modal-title{
font-size:46px;
font-weight:700;
line-height:1.25;
margin-bottom:20px;
}

.modal-price{
font-size:52px;
font-weight:700;
margin-bottom:16px;
}

.modal-detail{
font-size:22px;
margin-bottom:12px;
}

#servingsBox{
display:inline-block;
background:black;
color:white;
padding:10px 18px;
border-radius:40px;
font-size:16px;
margin-bottom:24px;
letter-spacing:1px;
}

.features{
padding-left:22px;
margin:25px 0;
}

.features li{
font-size:20px;
margin-bottom:12px;
line-height:1.5;
}

.variant-title{
font-size:26px;
font-weight:700;
margin-top:22px;
margin-bottom:12px;
}

.variant-wrap{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.variant-btn{
padding:12px 18px;
border:1px solid #ccc;
border-radius:12px;
cursor:pointer;
font-size:18px;
background:white;
transition:.2s;
}

.variant-btn:hover{
border-color:black;
}

.variant-out{
opacity:.45;
text-decoration:line-through;
}

.order-btn{
width:100%;
height:62px;
border:none;
border-radius:14px;
background:#25D366;
color:white;
font-size:22px;
font-weight:700;
cursor:pointer;
margin-top:20px;
}

/* FLOAT */

.float{
position:fixed;
right:18px;
bottom:18px;
width:72px;
height:72px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
color:white;
text-decoration:none;
z-index:999;
}

/* MOBILE */

@media(max-width:950px){

.modal-box{
grid-template-columns:1fr;
}

.hero{
height:320px;
}

.hero-content h2{
font-size:38px;
}

.hero-content p{
font-size:18px;
}

.sticky-bar{
top:85px;
flex-direction:column;
}

.products-row{
grid-template-columns:1fr 1fr;
}

.modal-title{
font-size:34px;
}

.modal-price{
font-size:38px;
}

#mainImage{
height:350px;
}

}

@media(max-width:650px){

.products-row{
grid-template-columns:1fr;
}

header{
padding:14px;
}

.logo h1{
font-size:20px;
}

.contact{
display:none;
}

}

</style>

</head>

<body>

<header>

<div class="logo">

<img src="https://i.postimg.cc/ncHVXSW3/LOGO.jpg">

<h1>AL HAYAT TRADING</h1>

</div>

<div class="contact">
📞 +91 77100 77786
</div>

</header>

<section class="hero">

<div class="hero-content">

<h2>100% Authentic Imported Supplements</h2>

<p>
Luxury Sports Nutrition Collection
</p>

</div>

</section>

<div class="sticky-bar">

<select id="mainFilter" onchange="applyFilter()">

<option value="assorted">Assorted</option>
<option value="brand">Shop By Brand</option>
<option value="category">Shop By Category</option>

</select>

<input
type="text"
placeholder="Search Products..."
id="searchInput"
onkeyup="searchProducts()">

</div>

<div id="allCategories"></div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-box">

<div class="close-modal" onclick="closeModal()">
×
</div>

<div class="modal-left">

<img id="mainImage">

<div class="thumbs" id="thumbs"></div>

</div>

<div class="modal-right">

<div id="modalTitle" class="modal-title"></div>

<div id="modalPrice" class="modal-price"></div>

<div id="servingsBox"></div>

<div id="modalStock" class="stock"></div>

<div id="modalSize" class="modal-detail"></div>

<div id="modalFlavor" class="modal-detail"></div>

<div class="variant-title">
Flavours
</div>

<div id="flavourContainer" class="variant-wrap"></div>

<div class="variant-title">
Sizes
</div>

<div id="sizeContainer" class="variant-wrap"></div>

<ul id="modalFeatures" class="features"></ul>

<button id="orderBtn" class="order-btn">
Order On WhatsApp
</button>

</div>

</div>

</div>

<a
href="https://wa.me/917710077786"
class="float"
target="_blank">

💬

</a>

<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQZimj_keJIooGDnz0sOvML4cjwbQ8eZBnQ3CQ1xyiORgHssrZPaCYzqdbFz-EmKmFrAqBgV6C3kLUK/pub?output=csv";

const WHATSAPP = "917710077786";

let allProducts = [];
let groupedProducts = [];

let currentImages = [];
let currentImageIndex = 0;

/* CSV */

function parseCSVLine(line){

const result = [];
let current = '';
let insideQuotes = false;

for(let i=0;i<line.length;i++){

const char = line[i];

if(char === '"'){
insideQuotes = !insideQuotes;
}

else if(char === ',' && !insideQuotes){

result.push(current);
current='';

}

else{
current += char;
}

}

result.push(current);

return result.map(v=>v.trim());

}

/* LOAD */

async function loadProducts(){

const response =
await fetch(CSV_URL);

const csv =
await response.text();

const rows =
csv.split("\n").slice(1);

const temp = [];

rows.forEach(row=>{

const cols =
parseCSVLine(row);

if(cols.length < 3) return;

temp.push({

sku: cols[0] || "",
brand: cols[1] || "",
item: cols[2] || "",
price: cols[3] || "",
stock: cols[4] || "",
category: cols[5] || "",
size: cols[6] || "",
flavour: cols[7] || "",

image1: cols[8] || "",
image2: cols[9] || "",
image3: cols[10] || "",

bullet1: cols[11] || "",
bullet2: cols[12] || "",
bullet3: cols[13] || "",
bullet4: cols[14] || "",

servings: cols[15] || ""

});

});

allProducts = temp;

groupProducts();

renderProducts(groupedProducts);

}

/* GROUP */

function normalizeTitle(title){

return title
.replace(/\d+\s?(Pounds|LBS|LB|Servings|Grams|Capsules|Softgels)/gi,'')
.replace(/\b(Gourmet Chocolate|Gourmet Vanilla|Fudge Brownie|Cocoa Pebbles|Fruity Pebbles|Birthday Cake Pebbles|Cookies & Cream|Strawberry|Chocolate Peanut Butter|Dunkin' Mocha Latte|Dunkin' Cappuccino|Dunkin' Glazed Donut|Salted Caramel|Cinamon Cereal)\b/gi,'')
.trim();

}

function groupProducts(){

const grouped = {};

allProducts.forEach(product=>{

const key =
product.brand + "||" +
normalizeTitle(product.item);

if(!grouped[key]){
grouped[key] = [];
}

grouped[key].push(product);

});

groupedProducts =
Object.values(grouped);

}

/* RENDER */

function renderProducts(products){

const container =
document.getElementById("allCategories");

container.innerHTML = `

<div class="products-row">

${products.map((group,index)=>{

const product = group[0];

const image =
product.image1 ||
product.image2 ||
product.image3 ||
"";

const inStock =
group.some(p=>
!p.stock.toLowerCase().includes("out"));

const minPrice =
Math.min(...group.map(p=>
Number(p.price) || 999999));

return `

<div class="card"
onclick="openModal(${index})">

<div class="product-image">

<img
src="${image}"
loading="lazy">

</div>

<div class="product-content">

<div class="product-title">

${normalizeTitle(product.item)}

</div>

<div class="product-meta">

${product.brand}

</div>

<div class="product-price">

₹${minPrice !== 999999 ? minPrice : ""}

</div>

<div class="stock ${inStock ? 'instock' : 'outstock'}">

${inStock ? 'In Stock' : 'Out Of Stock'}

</div>

<button class="card-btn">

View Product

</button>

</div>

</div>

`;

}).join("")}

</div>

`;

}

/* SEARCH */

function searchProducts(){

const text =
document.getElementById("searchInput")
.value
.toLowerCase();

const filtered =
groupedProducts.filter(group=>{

const p = group[0];

return (

p.item.toLowerCase().includes(text)
||
p.brand.toLowerCase().includes(text)
||
p.category.toLowerCase().includes(text)

);

});

renderProducts(filtered);

}

/* FILTER */

function applyFilter(){

const type =
document.getElementById("mainFilter").value;

if(type === "brand"){

groupedProducts.sort((a,b)=>
a[0].brand.localeCompare(b[0].brand));

}

else if(type === "category"){

groupedProducts.sort((a,b)=>
a[0].category.localeCompare(b[0].category));

}

renderProducts(groupedProducts);

}

/* MODAL */

function openModal(index){

const group =
groupedProducts[index];

renderVariant(group, group[0]);

document.getElementById("modal")
.style.display = "flex";

}

/* VARIANT */

function renderVariant(group, product){

currentImages = [

product.image1,
product.image2,
product.image3

].filter(Boolean);

currentImageIndex = 0;

document.getElementById("mainImage").src =
currentImages[0];

document.getElementById("modalTitle").innerText =
normalizeTitle(product.item);

document.getElementById("modalPrice").innerText =
product.price
?
`₹${product.price}`
:
"Contact For Price";

document.getElementById("modalStock").innerHTML =
product.stock;

document.getElementById("modalStock").className =
`stock ${product.stock.toLowerCase().includes('out') ? 'outstock' : 'instock'}`;

document.getElementById("modalSize").innerHTML =
`<b>Size:</b> ${product.size || "-"}`;

document.getElementById("modalFlavor").innerHTML =
`<b>Flavor:</b> ${product.flavour || "-"}`;

document.getElementById("servingsBox").innerHTML =
product.servings
?
`${product.servings} SERVINGS`
:
"";

document.getElementById("thumbs").innerHTML =

currentImages.map((img,i)=>`

<img
class="thumb"
src="${img}"
onclick="changeImage(${i})">

`).join("");

document.getElementById("modalFeatures").innerHTML = `

${product.bullet1 ? `<li>${product.bullet1}</li>` : ""}
${product.bullet2 ? `<li>${product.bullet2}</li>` : ""}
${product.bullet3 ? `<li>${product.bullet3}</li>` : ""}
${product.bullet4 ? `<li>${product.bullet4}</li>` : ""}

`;

/* FLAVOURS */

const flavourHTML =
group.map(item=>{

const out =
item.stock.toLowerCase().includes("out");

return `

<div
class="variant-btn ${out ? 'variant-out' : ''}"
onclick='renderVariant(groupedProducts.find(g=>g.includes(allProducts.find(p=>p.sku=="${item.sku}"))), allProducts.find(p=>p.sku=="${item.sku}"))'>

${item.flavour || "Default"}

</div>

`;

}).join("");

document.getElementById("flavourContainer").innerHTML =
flavourHTML;

/* SIZES */

const uniqueSizes =
[...new Set(group.map(x=>x.size))];

const sizeHTML =
uniqueSizes.map(size=>{

const exists =
group.find(x=>x.size===size);

const out =
exists.stock.toLowerCase().includes("out");

return `

<div class="variant-btn ${out ? 'variant-out' : ''}">

${size}

</div>

`;

}).join("");

document.getElementById("sizeContainer").innerHTML =
sizeHTML;

document.getElementById("orderBtn").onclick = function(){

const msg = `Hello,

I want to order:

${product.item}

Flavor: ${product.flavour}

Size: ${product.size}

Price: ₹${product.price}`;

window.open(

`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`,

"_blank"

);

};

}

/* IMAGE */

function changeImage(index){

currentImageIndex = index;

document.getElementById("mainImage").src =
currentImages[index];

}

/* KEYBOARD */

document.addEventListener("keydown", function(e){

const modal =
document.getElementById("modal");

if(modal.style.display !== "flex") return;

if(e.key === "ArrowRight"){

currentImageIndex++;

if(currentImageIndex >= currentImages.length){

currentImageIndex = 0;

}

changeImage(currentImageIndex);

}

if(e.key === "ArrowLeft"){

currentImageIndex--;

if(currentImageIndex < 0){

currentImageIndex =
currentImages.length - 1;

}

changeImage(currentImageIndex);

}

});

/* ZOOM */

document.addEventListener("click", function(e){

if(e.target.id === "mainImage"){

e.target.classList.toggle("zoomed");

}

});

/* CLOSE */

function closeModal(){

document.getElementById("modal")
.style.display = "none";

}

window.onclick = function(e){

const modal =
document.getElementById("modal");

if(e.target === modal){

closeModal();

}

};

loadProducts();

</script>

</body>
</html>
